<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seamless Flow Player</title>
    <style>
        /* ================= CSS: UI APPLE/SPOTIFY INSPIRADA ================= */
        :root {
            --primary-color: #1DB954; /* Color por defecto, cambiará con la IA */
            --bg-color: #121212;
            --text-color: #FFFFFF;
            --text-secondary: #B3B3B3;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "San Francisco", "Helvetica Neue", Helvetica, Arial, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden;
            transition: background 1s ease;
        }

        /* Fondo dinámico con la portada de la canción borrosa */
        #bg-image {
            position: absolute;
            top: -10%; left: -10%; width: 120%; height: 120%;
            background-size: cover;
            background-position: center;
            filter: blur(60px) brightness(0.4);
            z-index: -1;
            transition: background-image 1.5s ease;
        }

        /* Contenedor principal con Glassmorphism */
        .player-container {
            width: 380px;
            padding: 30px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            text-align: center;
            transition: box-shadow 1s ease;
        }

        .cover-wrapper {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: transform 0.3s ease, box-shadow 1s ease;
        }

        .cover-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: opacity 0.5s ease;
        }

        /* Efecto al pausar */
        .paused .cover-wrapper {
            transform: scale(0.95);
        }

        .song-info {
            margin-bottom: 25px;
        }

        .song-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 5px;
            letter-spacing: -0.5px;
        }

        .song-artist {
            font-size: 16px;
            color: var(--text-secondary);
            font-weight: 400;
        }

        /* Barra de progreso */
        .progress-container {
            width: 100%;
            margin-bottom: 25px;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
            cursor: pointer;
            position: relative;
        }

        .progress {
            height: 100%;
            background-color: var(--primary-color);
            border-radius: 3px;
            width: 0%;
            transition: background-color 1s ease;
        }

        .time-info {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 8px;
            font-variant-numeric: tabular-nums;
        }

        /* Controles */
        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-secondary);
            transition: all 0.2s ease;
        }

        .btn:hover {
            color: #FFF;
            transform: scale(1.1);
        }

        .btn svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }

        .btn-play {
            width: 60px;
            height: 60px;
            background-color: var(--primary-color);
            color: #000;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background-color 1s ease, transform 0.1s ease;
        }

        .btn-play:hover {
            transform: scale(1.05);
            color: #000;
        }

        .btn-play svg {
            width: 28px;
            height: 28px;
        }

        .active-shuffle {
            color: var(--primary-color);
        }
    </style>
</head>
<body>

    <!-- Fondo dinámico -->
    <div id="bg-image"></div>

    <!-- UI del Reproductor -->
    <div class="player-container paused" id="player">
        <div class="cover-wrapper" id="cover-glow">
            <img src="" id="cover" crossorigin="anonymous">
        </div>
        
        <div class="song-info">
            <div class="song-title" id="title">Cargando...</div>
            <div class="song-artist" id="artist">Cargando...</div>
        </div>

        <div class="progress-container">
            <div class="progress-bar" id="progress-bar">
                <div class="progress" id="progress"></div>
            </div>
            <div class="time-info">
                <span id="current-time">0:00</span>
                <span id="duration">0:00</span>
            </div>
        </div>

        <div class="controls">
            <button class="btn" id="btn-shuffle">
                <svg viewBox="0 0 24 24"><path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/></svg>
            </button>
            <button class="btn" id="btn-prev">
                <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
            </button>
            <button class="btn btn-play" id="btn-play">
                <svg id="play-icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                <svg id="pause-icon" viewBox="0 0 24 24" style="display:none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
            </button>
            <button class="btn" id="btn-next">
                <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
            </button>
        </div>
    </div>

    <script>
        /* ================= CONFIGURACIÓN DE TU PLAYLIST ================= */
        // Aquí conectamos tus carpetas "songs/" y "covers/"
        const playlist =[
            { 
                title: "WOH OH OH", 
                artist: "OMAR COURTZ, ROA", // Puedes cambiar esto por el nombre real
                cover: "covers/WOH OH OH.jpg", 
                file: "songs/WOH OH OH.mp3" 
            },
            { 
                title: "444", 
                artist: "YAN BLOCK", 
                cover: "covers/444.jpg", 
                file: "songs/444.mp3" 
            },
            { 
                title: "FOREVEL TU GANTEL", 
                artist: "OMAR COURTZ, NENGO FLOW", 
                cover: "covers/FOREVEL TU GANTEL.jpg", 
                file: "songs/FOREVEL TU GANTEL.mp3" 
            }
        ];

        /* ================= ESTADO DEL REPRODUCTOR ================= */
        let currentIndex = 0;
        let isPlaying = false;
        let isShuffle = false;
        let isCrossfading = false;
        const CROSSFADE_DURATION = 6; // Segundos de mezcla (fade) entre canciones

        let audioMain = new Audio();
        let audioNext = new Audio();

        const coverEl = document.getElementById('cover');
        const titleEl = document.getElementById('title');
        const artistEl = document.getElementById('artist');
        const bgImageEl = document.getElementById('bg-image');
        const rootVars = document.documentElement.style;
        const coverGlow = document.getElementById('cover-glow');

        function initPlayer() {
            loadSongInfo(currentIndex);
            audioMain.src = playlist[currentIndex].file;
            audioMain.volume = 1;
        }

        function loadSongInfo(index) {
            const song = playlist[index];
            coverEl.src = song.cover;
            titleEl.textContent = song.title;
            artistEl.textContent = song.artist;
            bgImageEl.style.backgroundImage = `url('${song.cover}')`;
        }

        /* ================= AI: EXTRACCIÓN DE COLOR DINÁMICO ================= */
        coverEl.onload = function() {
            const canvas = document.createElement('canvas');
            const context = canvas.getContext('2d');
            canvas.width = coverEl.width;
            canvas.height = coverEl.height;
            
            try {
                context.drawImage(coverEl, 0, 0, canvas.width, canvas.height);
                const data = context.getImageData(0, 0, canvas.width, canvas.height).data;
                let r = 0, g = 0, b = 0;
                
                for (let i = 0; i < data.length; i += 16) { 
                    r += data[i];
                    g += data[i+1];
                    b += data[i+2];
                }
                const count = data.length / 16;
                r = Math.floor(r / count);
                g = Math.floor(g / count);
                b = Math.floor(b / count);

                const rgb = `rgb(${r}, ${g}, ${b})`;
                rootVars.setProperty('--primary-color', rgb);
                coverGlow.style.boxShadow = `0 15px 40px rgba(${r}, ${g}, ${b}, 0.6)`;
            } catch (e) {
                rootVars.setProperty('--primary-color', '#1DB954');
            }
        };

        /* ================= AI: SMART CROSSFADE ENGINE ================= */
        audioMain.addEventListener('timeupdate', () => {
            if (!isPlaying) return;

            const currentTime = audioMain.currentTime;
            const duration = audioMain.duration;
            
            updateProgressBar(currentTime, duration);

            // Iniciar la mezcla si faltan pocos segundos
            if (duration - currentTime <= CROSSFADE_DURATION && !isCrossfading && duration > 0) {
                startSmartCrossfade();
            }
        });

        // Cuando la canción acaba (por si acaso falla el fade)
        audioMain.addEventListener('ended', () => {
            if (!isCrossfading) {
                currentIndex = getNextIndex();
                initPlayer();
                audioMain.play();
            }
        });

        function getNextIndex() {
            if (isShuffle) {
                let next;
                do { next = Math.floor(Math.random() * playlist.length); } 
                while (next === currentIndex && playlist.length > 1);
                return next;
            }
            return (currentIndex + 1) % playlist.length;
        }

        function startSmartCrossfade() {
            isCrossfading = true;
            let nextIdx = getNextIndex();
            
            audioNext.src = playlist[nextIdx].file;
            audioNext.volume = 0; 
            audioNext.play();

            loadSongInfo(nextIdx); 

            let fadeInterval = setInterval(() => {
                if (audioMain.volume > 0.05) audioMain.volume -= 0.05;
                if (audioNext.volume < 0.95) audioNext.volume += 0.05;

                if (audioMain.volume <= 0.05) {
                    clearInterval(fadeInterval);
                    audioMain.pause();
                    audioMain.volume = 1;
                    
                    let temp = audioMain;
                    audioMain = audioNext;
                    audioNext = temp;
                    
                    currentIndex = nextIdx;
                    isCrossfading = false;
                }
            }, (CROSSFADE_DURATION * 1000) / 20); 
        }

        /* ================= CONTROLES BÁSICOS ================= */
        const playBtn = document.getElementById('btn-play');
        const playIcon = document.getElementById('play-icon');
        const pauseIcon = document.getElementById('pause-icon');
        const playerContainer = document.getElementById('player');

        function togglePlay() {
            if (isPlaying) {
                audioMain.pause();
                playIcon.style.display = 'block';
                pauseIcon.style.display = 'none';
                playerContainer.classList.add('paused');
            } else {
                audioMain.play();
                playIcon.style.display = 'none';
                pauseIcon.style.display = 'block';
                playerContainer.classList.remove('paused');
            }
            isPlaying = !isPlaying;
        }

        playBtn.addEventListener('click', togglePlay);

        document.getElementById('btn-next').addEventListener('click', () => {
            currentIndex = getNextIndex();
            isCrossfading = false;
            initPlayer();
            if(isPlaying) audioMain.play();
        });

        document.getElementById('btn-prev').addEventListener('click', () => {
            if (audioMain.currentTime > 3) {
                audioMain.currentTime = 0; 
            } else {
                currentIndex = (currentIndex - 1 + playlist.length) % playlist.length;
                initPlayer();
                if(isPlaying) audioMain.play();
            }
        });

        document.getElementById('btn-shuffle').addEventListener('click', function() {
            isShuffle = !isShuffle;
            this.classList.toggle('active-shuffle', isShuffle);
        });

        /* ================= BARRA DE PROGRESO ================= */
        const progressBar = document.getElementById('progress-bar');
        const progress = document.getElementById('progress');
        const currTimeEl = document.getElementById('current-time');
        const durationEl = document.getElementById('duration');

        function formatTime(sec) {
            let min = Math.floor(sec / 60);
            let s = Math.floor(sec % 60);
            if (s < 10) s = '0' + s;
            return `${min}:${s}`;
        }

        function updateProgressBar(currentTime, duration) {
            if (duration && !isNaN(duration)) {
                const percent = (currentTime / duration) * 100;
                progress.style.width = `${percent}%`;
                currTimeEl.textContent = formatTime(currentTime);
                durationEl.textContent = formatTime(duration);
            }
        }

        progressBar.addEventListener('click', (e) => {
            const width = progressBar.clientWidth;
            const clickX = e.offsetX;
            const duration = audioMain.duration;
            audioMain.currentTime = (clickX / width) * duration;
        });

        // Iniciar el reproductor
        initPlayer();
    </script>
</body>
</html>
