<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seamless Flow Player</title>
    <style>
        /* ================= CSS: UI APPLE/SPOTIFY INSPIRADA ================= */
        :root {
            --primary-color: #1DB954; 
            --bg-color: #000000;
            --text-color: #FFFFFF;
            --text-secondary: #B3B3B3;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "San Francisco", "Helvetica Neue", Helvetica, Arial, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden;
        }

        /* ================= MOTOR DE VIDEO DE FONDO ================= */
        .video-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background-color: #000;
        }

        .bg-video {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover;
            filter: brightness(0.35); 
            transition: opacity 0.5s ease;
        }

        /* ================= CONTENEDOR GLASSMORPHISM ================= */
        .player-container {
            width: 380px;
            padding: 30px;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 30px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.8);
            text-align: center;
            transition: box-shadow 1s ease;
        }

        .cover-wrapper {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: transform 0.3s ease, box-shadow 1s ease;
        }

        .cover-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: opacity 0.5s ease;
        }

        .paused .cover-wrapper {
            transform: scale(0.95);
        }

        .song-info {
            margin-bottom: 25px;
        }

        .song-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 5px;
            letter-spacing: -0.5px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        .song-artist {
            font-size: 16px;
            color: var(--text-secondary);
            font-weight: 400;
        }

        /* Barra de progreso */
        .progress-container {
            width: 100%;
            margin-bottom: 20px;
            padding: 10px 0; 
            cursor: pointer;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
            position: relative;
        }

        .progress {
            height: 100%;
            background-color: var(--primary-color);
            border-radius: 3px;
            width: 0%;
            pointer-events: none; 
            /* Se quitó la transición de width para que fluya a 60FPS exactos */
            transition: background-color 1s ease; 
            box-shadow: 0 0 10px var(--primary-color);
        }

        .time-info {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 8px;
            font-variant-numeric: tabular-nums;
            pointer-events: none;
        }

        /* Controles Simétricos */
        .controls {
            display: flex;
            justify-content: space-between; 
            align-items: center;
            width: 100%;
        }

        .main-controls {
            display: flex;
            align-items: center;
            gap: 25px; 
        }

        .btn {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-secondary);
            transition: all 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .btn:hover {
            color: #FFF;
            transform: scale(1.1);
        }

        .btn svg {
            width: 22px;
            height: 22px;
            fill: currentColor;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
        }

        .btn-play {
            width: 64px;
            height: 64px;
            background-color: var(--primary-color);
            color: #000;
            border-radius: 50%;
            transition: background-color 1s ease, transform 0.1s ease;
        }

        .btn-play:hover {
            transform: scale(1.05);
            color: #000;
        }

        .btn-play svg {
            width: 30px;
            height: 30px;
            filter: none;
        }

        #play-icon {
            transform: translateX(2px);
        }

        .active-state {
            color: var(--primary-color);
        }
    </style>
</head>
<body>

    <!-- Videos -->
    <div class="video-container">
        <video id="bg-video-main" class="bg-video" autoplay loop muted playsinline></video>
        <video id="bg-video-next" class="bg-video" autoplay loop muted playsinline style="opacity: 0;"></video>
    </div>

    <!-- UI -->
    <div class="player-container paused" id="player">
        <div class="cover-wrapper" id="cover-glow">
            <img src="" id="cover" crossorigin="anonymous">
        </div>
        
        <div class="song-info">
            <div class="song-title" id="title">Cargando...</div>
            <div class="song-artist" id="artist">Cargando...</div>
        </div>

        <div class="progress-container" id="progress-container">
            <div class="progress-bar" id="progress-bar">
                <div class="progress" id="progress"></div>
            </div>
            <div class="time-info">
                <span id="current-time">0:00</span>
                <span id="duration">0:00</span>
            </div>
        </div>

        <div class="controls">
            <button class="btn" id="btn-shuffle">
                <svg viewBox="0 0 24 24"><path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/></svg>
            </button>
            <div class="main-controls">
                <button class="btn" id="btn-prev">
                    <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
                </button>
                <button class="btn btn-play" id="btn-play">
                    <svg id="play-icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                    <svg id="pause-icon" viewBox="0 0 24 24" style="display:none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                </button>
                <button class="btn" id="btn-next">
                    <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
                </button>
            </div>
            <button class="btn" id="btn-repeat">
                <svg viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg>
            </button>
        </div>
    </div>

    <script>
        /* ================= CONFIGURACIÓN ================= */
        const playlist =[
            { title: "WOH OH OH", artist: "OMAR COURTZ, ROA", cover: "covers/WOH OH OH.jpg", file: "songs/WOH OH OH.mp3", video: "videos/WOH OH OH.mp4" },
            { title: "444", artist: "YAN BLOCK", cover: "covers/444.jpg", file: "songs/444.mp3", video: "videos/444.mp4" },
            { title: "FOREVEL TU GANTEL", artist: "OMAR COURTZ, NENGO FLOW", cover: "covers/FOREVEL TU GANTEL.jpg", file: "songs/FOREVEL TU GANTEL.mp3", video: "videos/FOREVEL TU GANTEL.mp4" }
        ];

        /* ================= ESTADO ================= */
        let currentIndex = 0;
        let isPlaying = false;
        let isShuffle = false;
        let isRepeat = false; 
        let isCrossfading = false;
        let fadeInterval = null; // Guardamos el intervalo globalmente para poder matarlo
        const CROSSFADE_DURATION = 6; 

        // Motores
        let audioMain = new Audio();
        let audioNext = new Audio();
        let videoMain = document.getElementById('bg-video-main');
        let videoNext = document.getElementById('bg-video-next');

        const coverEl = document.getElementById('cover');
        const titleEl = document.getElementById('title');
        const artistEl = document.getElementById('artist');
        const rootVars = document.documentElement.style;
        const coverGlow = document.getElementById('cover-glow');

        // FUNCIÓN "BOTÓN DE PÁNICO": Mata cualquier mezcla en curso si saltas de canción manualmente
        function cancelCrossfade() {
            if (fadeInterval) {
                clearInterval(fadeInterval);
                fadeInterval = null;
            }
            isCrossfading = false;
            
            audioMain.volume = 1; // Restauramos volumen por si se quedó a medias
            videoMain.style.opacity = '1';
            videoMain.style.transition = 'opacity 0.5s ease';
            
            audioNext.pause();
            audioNext.volume = 0;
            videoNext.pause();
            videoNext.style.opacity = '0';
        }

        function initPlayer() {
            cancelCrossfade(); // Aseguramos que nada interfiera al cargar nueva canción
            loadSongInfo(currentIndex);
            
            audioMain.src = playlist[currentIndex].file;
            audioMain.volume = 1;

            videoMain.style.transition = 'opacity 0.5s ease';
            videoNext.style.transition = 'opacity 0.5s ease';
            videoMain.style.opacity = '1';
            videoNext.style.opacity = '0';
            
            videoMain.src = playlist[currentIndex].video;
        }

        function loadSongInfo(index) {
            const song = playlist[index];
            coverEl.src = song.cover;
            titleEl.textContent = song.title;
            artistEl.textContent = song.artist;
        }

        /* ================= COLOR DINÁMICO ================= */
        coverEl.onload = function() {
            const canvas = document.createElement('canvas');
            const context = canvas.getContext('2d');
            canvas.width = coverEl.width;
            canvas.height = coverEl.height;
            try {
                context.drawImage(coverEl, 0, 0, canvas.width, canvas.height);
                const data = context.getImageData(0, 0, canvas.width, canvas.height).data;
                let r = 0, g = 0, b = 0;
                for (let i = 0; i < data.length; i += 16) { 
                    r += data[i]; g += data[i+1]; b += data[i+2];
                }
                const count = data.length / 16;
                r = Math.floor(r / count); g = Math.floor(g / count); b = Math.floor(b / count);
                rootVars.setProperty('--primary-color', `rgb(${r}, ${g}, ${b})`);
                coverGlow.style.boxShadow = `0 15px 40px rgba(${r}, ${g}, ${b}, 0.6)`;
            } catch (e) {
                rootVars.setProperty('--primary-color', '#1DB954');
            }
        };

        function getNextIndex() {
            if (isRepeat) return currentIndex; 
            if (isShuffle) {
                let next;
                do { next = Math.floor(Math.random() * playlist.length); } 
                while (next === currentIndex && playlist.length > 1);
                return next;
            }
            return (currentIndex + 1) % playlist.length;
        }

        function startSmartCrossfade() {
            isCrossfading = true;
            let nextIdx = getNextIndex();
            
            audioNext.src = playlist[nextIdx].file;
            audioNext.volume = 0; 
            audioNext.play();

            videoNext.src = playlist[nextIdx].video;
            videoNext.style.transition = `opacity ${CROSSFADE_DURATION}s linear`;
            videoMain.style.transition = `opacity ${CROSSFADE_DURATION}s linear`;
            
            setTimeout(() => {
                videoNext.play().catch(e => console.log(e));
                videoNext.style.opacity = '1';
                videoMain.style.opacity = '0';
            }, 50);

            loadSongInfo(nextIdx); 

            fadeInterval = setInterval(() => {
                if (!isCrossfading) { // Chequeo de seguridad
                    clearInterval(fadeInterval);
                    return;
                }

                if (audioMain.volume > 0.05) audioMain.volume -= 0.05;
                if (audioNext.volume < 0.95) audioNext.volume += 0.05;

                if (audioMain.volume <= 0.05) {
                    clearInterval(fadeInterval);
                    fadeInterval = null;
                    
                    audioMain.pause();
                    audioMain.volume = 1;
                    
                    let tempAudio = audioMain;
                    audioMain = audioNext;
                    audioNext = tempAudio;
                    
                    videoMain.pause();
                    let tempVid = videoMain;
                    videoMain = videoNext;
                    videoNext = tempVid;

                    currentIndex = nextIdx;
                    isCrossfading = false;
                }
            }, (CROSSFADE_DURATION * 1000) / 20); 
        }

        /* ================= 60FPS UI ENGINE (SÚPER FLUIDO) ================= */
        // Esto reemplaza el viejo y problemático 'timeupdate'
        function renderLoop() {
            if (isPlaying && audioMain) {
                const currentTime = audioMain.currentTime;
                const duration = audioMain.duration;
                
                updateProgressBar(currentTime, duration);

                if (duration > 0 && !isNaN(duration) && !isCrossfading) {
                    if (duration - currentTime <= CROSSFADE_DURATION) {
                        startSmartCrossfade();
                    } else if (currentTime >= duration || audioMain.ended) {
                        // Backup natural si por algún milagro falla el crossfade
                        currentIndex = getNextIndex();
                        initPlayer();
                        audioMain.play();
                        videoMain.play().catch(e => console.log(e));
                    }
                }
            }
            requestAnimationFrame(renderLoop);
        }
        requestAnimationFrame(renderLoop); // Inicia el motor visual para siempre

        /* ================= CONTROLES ================= */
        const playBtn = document.getElementById('btn-play');
        const playIcon = document.getElementById('play-icon');
        const pauseIcon = document.getElementById('pause-icon');
        const playerContainer = document.getElementById('player');

        function togglePlay() {
            if (isPlaying) {
                audioMain.pause();
                videoMain.pause();
                if (isCrossfading) {
                    audioNext.pause();
                    videoNext.pause();
                }
                playIcon.style.display = 'block';
                pauseIcon.style.display = 'none';
                playerContainer.classList.add('paused');
            } else {
                audioMain.play();
                videoMain.play().catch(e=>console.log("Auto-play prevenido"));
                if (isCrossfading) {
                    audioNext.play();
                    videoNext.play();
                }
                playIcon.style.display = 'none';
                pauseIcon.style.display = 'block';
                playerContainer.classList.remove('paused');
            }
            isPlaying = !isPlaying;
        }

        playBtn.addEventListener('click', togglePlay);

        document.getElementById('btn-next').addEventListener('click', () => {
            currentIndex = getNextIndex();
            initPlayer();
            if(isPlaying) {
                audioMain.play();
                videoMain.play();
            }
        });

        document.getElementById('btn-prev').addEventListener('click', () => {
            if (audioMain.currentTime > 3) {
                audioMain.currentTime = 0; 
                videoMain.currentTime = 0;
                cancelCrossfade(); // Cancelamos mezcla si regresas al inicio
            } else {
                currentIndex = (currentIndex - 1 + playlist.length) % playlist.length;
                initPlayer();
                if(isPlaying) {
                    audioMain.play();
                    videoMain.play();
                }
            }
        });

        document.getElementById('btn-shuffle').addEventListener('click', function() {
            isShuffle = !isShuffle;
            this.classList.toggle('active-state', isShuffle);
        });

        document.getElementById('btn-repeat').addEventListener('click', function() {
            isRepeat = !isRepeat;
            this.classList.toggle('active-state', isRepeat);
        });

        /* ================= BARRA DE PROGRESO ANTI-BUGS ================= */
        const progressContainer = document.getElementById('progress-container');
        const progress = document.getElementById('progress');
        const currTimeEl = document.getElementById('current-time');
        const durationEl = document.getElementById('duration');

        function formatTime(sec) {
            let min = Math.floor(sec / 60);
            let s = Math.floor(sec % 60);
            if (s < 10) s = '0' + s;
            return `${min}:${s}`;
        }

        function updateProgressBar(currentTime, duration) {
            if (duration && !isNaN(duration)) {
                const percent = (currentTime / duration) * 100;
                progress.style.width = `${percent}%`;
                currTimeEl.textContent = formatTime(currentTime);
                durationEl.textContent = formatTime(duration);
            }
        }

        progressContainer.addEventListener('click', (e) => {
            const rect = progressContainer.getBoundingClientRect();
            const clickX = e.clientX - rect.left;
            const width = rect.width;
            const duration = audioMain.duration;
            
            if (duration && !isNaN(duration)) {
                const newTime = (clickX / width) * duration;
                audioMain.currentTime = newTime;
                
                // ¡NUEVO! Sincronizar el video de fondo al hacer skip
                videoMain.currentTime = newTime; 
                
                // Si saltas lejos del final de la canción, detenemos la mezcla si había una
                if (duration - newTime > CROSSFADE_DURATION) {
                    cancelCrossfade();
                } else if (duration - newTime <= CROSSFADE_DURATION && !isCrossfading) {
                    startSmartCrossfade();
                }
            }
        });

        // Iniciar
        initPlayer();
    </script>
</body>
</html>
