<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIVET - Premium Player</title>
    <style>
        :root {
            --accent-color: #ffffff;
            --accent-glow: rgba(255, 255, 255, 0.4);
            --bg-dark: #000000;
            --text-main: #ffffff;
            --text-sub: rgba(255, 255, 255, 0.7);
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            height: 100vh; width: 100vw;
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; position: relative;
        }

        /* --- VIDEOS DE FONDO (AHORA MÁS VISIBLES) --- */
        .video-background {
            position: absolute; top: -10%; left: -10%; width: 120%; height: 120%;
            object-fit: cover; z-index: 1; opacity: 0; 
            /* Reduje el blur de 40px a 20px y subí el brillo para que se vea más el fondo */
            filter: blur(20px) brightness(0.55) saturate(1.3); 
        }
        .video-background.active { opacity: 1; z-index: 2; }
        
        /* El overlay ahora es más transparente arriba y más oscuro solo abajo para proteger el texto */
        .overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.85) 100%); z-index: 3; }

        /* --- CONTENEDOR PRINCIPAL --- */
        .player-app {
            position: relative; z-index: 10;
            width: 100%; max-width: 420px; height: 100vh; max-height: 850px;
            padding: 40px 30px; display: flex; flex-direction: column;
            justify-content: space-between;
        }

        .header { text-align: center; font-size: 13px; font-weight: 700; letter-spacing: 2px; color: var(--accent-color); text-transform: uppercase; margin-bottom: 20px; transition: color 0.5s; position: relative; }

        /* --- INDICADOR "MIXING..." ESTILO APPLE MUSIC --- */
        .mixing-badge {
            position: absolute; top: -25px; left: 50%; transform: translateX(-50%);
            background-color: var(--accent-color); color: #000;
            padding: 4px 12px; border-radius: 12px;
            font-size: 10px; font-weight: 800; letter-spacing: 1px;
            box-shadow: 0 0 15px var(--accent-glow);
            opacity: 0; visibility: hidden;
            transition: opacity 0.4s ease, background-color 0.4s ease;
            z-index: 20;
        }
        .mixing-badge.active {
            opacity: 1; visibility: visible;
            animation: pulseMixing 1.5s infinite;
        }
        @keyframes pulseMixing {
            0% { transform: translateX(-50%) scale(0.95); opacity: 0.8; }
            50% { transform: translateX(-50%) scale(1.05); opacity: 1; }
            100% { transform: translateX(-50%) scale(0.95); opacity: 0.8; }
        }

        /* --- PORTADA Y NOTAS FLOTANTES --- */
        #artwork-wrapper { position: relative; margin-bottom: 30px; }
        
        .artwork-container {
            width: 100%; aspect-ratio: 1; border-radius: 24px; overflow: hidden;
            position: relative; z-index: 10;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6), 0 0 40px var(--accent-glow);
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.6s ease;
            transform-origin: center bottom;
        }
        .artwork-container img { width: 100%; height: 100%; object-fit: cover; }
        
        .player-paused .artwork-container {
            transform: scale(0.82);
            box-shadow: 0 10px 30px rgba(0,0,0,0.4), 0 0 15px rgba(255,255,255,0.02);
        }

        /* Notas flotantes estilo Cartoon */
        .music-note {
            position: absolute; color: var(--accent-color); font-size: 20px; font-weight: bold;
            pointer-events: none; z-index: 5; opacity: 0;
            animation: floatNote linear forwards; text-shadow: 0 0 10px var(--accent-glow);
        }
        @keyframes floatNote {
            0% { transform: translateY(0) scale(0.5) rotate(-15deg); opacity: 0; }
            20% { opacity: 1; transform: translateY(-30px) scale(1.2) rotate(15deg); }
            100% { transform: translateY(-120px) scale(0.8) rotate(-20deg); opacity: 0; }
        }

        /* --- INFO DE CANCIÓN --- */
        .track-info { text-align: left; margin-bottom: 25px; }
        .track-title { font-size: 28px; font-weight: 800; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 6px; letter-spacing: -0.5px; }
        .track-artist { font-size: 18px; font-weight: 500; color: var(--text-sub); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* --- BARRA DE PROGRESO --- */
        .progress-area { margin-bottom: 30px; }
        .progress-bar {
            -webkit-appearance: none; width: 100%; height: 6px; border-radius: 10px;
            background: rgba(255, 255, 255, 0.2); outline: none; cursor: pointer;
            background-image: linear-gradient(var(--accent-color), var(--accent-color));
            background-size: var(--progress, 0%) 100%; background-repeat: no-repeat;
            transition: height 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), background-image 0.4s ease;
        }
        .progress-bar:active { height: 10px; }
        .progress-bar::-webkit-slider-thumb {
            -webkit-appearance: none; width: 0; height: 0;
            background: #fff; border-radius: 50%; box-shadow: 0 0 10px rgba(0,0,0,0.5);
            transition: width 0.2s, height 0.2s;
        }
        .progress-bar:active::-webkit-slider-thumb, .progress-bar:hover::-webkit-slider-thumb { width: 16px; height: 16px; }
        
        .time-info { display: flex; justify-content: space-between; margin-top: 10px; font-size: 12px; font-weight: 700; color: var(--text-sub); }

        /* --- CONTROLES --- */
        .controls { display: flex; align-items: center; justify-content: space-between; }
        
        .btn { 
            background: none; border: none; cursor: pointer; 
            color: var(--accent-color); 
            display: flex; align-items: center; justify-content: center; 
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), color 0.4s ease, filter 0.4s;
        }
        
        .btn:hover { filter: brightness(1.3) drop-shadow(0 0 8px var(--accent-glow)); }
        .btn:active { transform: scale(0.65); transition: transform 0.1s; }
        .btn svg { width: 28px; height: 28px; fill: currentColor; }
        
        .btn-play {
            width: 76px; height: 76px; border-radius: 50%;
            background-color: var(--accent-color); color: #000;
            box-shadow: 0 10px 30px var(--accent-glow);
        }
        .btn-play:hover { transform: scale(1.1); }
        .btn-play:active { transform: scale(0.85); }
        .btn-play svg { width: 36px; height: 36px; fill: #000; margin-left: 4px; transition: fill 0.4s ease; }
        .btn-play.is-playing svg { margin-left: 0; } 

        .btn-secondary { opacity: 0.7; }
        .btn-secondary:hover { opacity: 1; }
        .btn-secondary.active { opacity: 1; filter: drop-shadow(0 0 10px var(--accent-glow)); }
        .btn-secondary.active::after { content: ''; position: absolute; bottom: -8px; width: 5px; height: 5px; background: var(--accent-color); border-radius: 50%; }

    </style>
</head>
<body class="player-paused">

    <video id="vid1" class="video-background active" loop muted playsinline></video>
    <video id="vid2" class="video-background" loop muted playsinline></video>
    <div class="overlay"></div>

    <div class="player-app">
        <div class="header">
            <div class="mixing-badge" id="mixing-badge">MIXING...</div>
            V I V E T
        </div>
        
        <div id="artwork-wrapper">
            <div class="artwork-container">
                <img id="cover" src="" alt="Portada" crossorigin="anonymous">
            </div>
        </div>

        <div>
            <div class="track-info">
                <div class="track-title" id="title">Cargando...</div>
                <div class="track-artist" id="artist">VIVET Music</div>
            </div>

            <div class="progress-area">
                <input type="range" class="progress-bar" id="progress" min="0" max="100" step="0.1" value="0">
                <div class="time-info">
                    <span id="time-current">0:00</span>
                    <span id="time-total">0:00</span>
                </div>
            </div>

            <div class="controls">
                <button class="btn btn-secondary" id="btn-shuffle"><svg viewBox="0 0 24 24"><path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/></svg></button>
                <button class="btn" id="btn-prev"><svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></button>
                
                <button class="btn btn-play" id="btn-play">
                    <svg id="icon-play" viewBox="0 0 24 24"><path d="M8 5.14v14.72a1 1 0 001.5.86l11-7.36a1 1 0 000-1.72l-11-7.36a1 1 0 00-1.5.86z"/></svg>
                    <svg id="icon-pause" viewBox="0 0 24 24" style="display: none;"><path d="M6 5h3v14H6zm9 0h3v14h-3z"/></svg>
                </button>
                
                <button class="btn" id="btn-next"><svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg></button>
                <button class="btn btn-secondary" id="btn-repeat"><svg viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg></button>
            </div>
        </div>
    </div>

    <script>
        // === PLAYLIST ===
        const playlist =[
            { title: "WOH OH OH", artist: "OMAR COURTZ, ROA", cover: "covers/WOH OH OH.jpg", file: "songs/WOH OH OH.mp3", video: "videos/WOH OH OH.mp4" },
            { title: "444", artist: "YAN BLOCK", cover: "covers/444.jpg", file: "songs/444.mp3", video: "videos/444.mp4" },
            { title: "FOREVEL TU GANTEL", artist: "OMAR COURTZ, NENGO FLOW", cover: "covers/FOREVEL TU GANTEL.jpg", file: "songs/FOREVEL TU GANTEL.mp3", video: "videos/FOREVEL TU GANTEL.mp4" },
            { title: "YO QUIERO", artist: "HADES66", cover: "covers/YO QUIERO.jpg", file: "songs/YO QUIERO.mp3", video: "videos/YO QUIERO.mp4" },
            { title: "VVS SWITCH REMIX", artist: "ANUEL AA, LUAR LA L", cover: "covers/VVS SWITCH REMIX.jpg", file: "songs/VVS SWITCH REMIX.mp3", video: "videos/VVS SWITCH REMIX.mp4" },
            { title: "FALSAS PROMESAS REMIX", artist: "MORA, ELADIO CARRION", cover: "covers/FALSAS PROMESAS REMIX.jpg", file: "songs/FALSAS PROMESAS REMIX.mp3", video: "videos/FALSAS PROMESAS REMIX.mp4" },
            { title: "TE VAS", artist: "OZUNA", cover: "covers/TE VAS.jpg", file: "songs/TE VAS.mp3", video: "videos/TE VAS.mp4" },
            { title: "RELIGION", artist: "YAN BLOCK", cover: "covers/RELIGION.jpg", file: "songs/RELIGION.mp3", video: "videos/RELIGION.mp4" },
            { title: "MEDIA HORA", artist: "YAN BLOCK", cover: "covers/MEDIA HORA.jpg", file: "songs/MEDIA HORA.mp3", video: "videos/MEDIA HORA.mp4" }
        ];

        // === ESTADOS ===
        let currentIdx = 0;
        let isPlaying = false;
        let isDragging = false;
        let isCrossfading = false;
        let crossfadeRafId = null;
        let activeLayer = 1; 
        const CROSSFADE_TIME = 12;

        // === DOM ELEMENTS ===
        const a1 = new Audio(), a2 = new Audio();
        const v1 = document.getElementById('vid1'), v2 = document.getElementById('vid2');
        const progressBar = document.getElementById('progress');
        const timeCurrentEl = document.getElementById('time-current');
        const timeTotalEl = document.getElementById('time-total');
        const playBtn = document.getElementById('btn-play');
        const mixingBadge = document.getElementById('mixing-badge');
        const colorCache = {};

        // === GENERADOR DE NOTAS CARTOON ===
        function spawnFloatingNote() {
            if (!isPlaying || document.hidden) return;
            const notes =['♪', '♫', '♬', '♩'];
            const note = document.createElement('div');
            note.className = 'music-note';
            note.innerText = notes[Math.floor(Math.random() * notes.length)];
            
            const randomX = Math.random() * 80 + 10; 
            note.style.left = `${randomX}%`;
            note.style.top = `100%`;
            
            const animDuration = 1.5 + Math.random() * 1.5;
            note.style.animationDuration = `${animDuration}s`;
            
            document.getElementById('artwork-wrapper').appendChild(note);
            setTimeout(() => note.remove(), animDuration * 1000);
        }
        setInterval(spawnFloatingNote, 700);

        // === BUCLE PRINCIPAL (UI FLUIDO) ===
        function updateLoop() {
            let activeAudio = activeLayer === 1 ? a1 : a2;
            
            if (activeAudio && !isNaN(activeAudio.duration)) {
                if (!isDragging) {
                    let pct = (activeAudio.currentTime / activeAudio.duration) * 100;
                    progressBar.value = pct || 0;
                    progressBar.style.setProperty('--progress', `${pct || 0}%`);
                }
                
                timeCurrentEl.textContent = formatTime(activeAudio.currentTime);
                timeTotalEl.textContent = formatTime(activeAudio.duration);

                // CROSSFADE DE 12 SEGUNDOS
                let timeLeft = activeAudio.duration - activeAudio.currentTime;
                if (timeLeft <= CROSSFADE_TIME && !isCrossfading && activeAudio.currentTime > CROSSFADE_TIME) {
                    startAutomaticCrossfade();
                }
            }
            requestAnimationFrame(updateLoop);
        }
        requestAnimationFrame(updateLoop);

        // === NAVEGACIÓN Y CERO BUGS ===
        function playTrack(idx, isManualSkip = true) {
            cancelAnimationFrame(crossfadeRafId);
            isCrossfading = false;
            mixingBadge.classList.remove('active'); // Ocultar cartel de MIXING si el usuario hace click manual

            let nextLayer = activeLayer === 1 ? 2 : 1;
            let currentAudio = activeLayer === 1 ? a1 : a2;
            let nextAudio = nextLayer === 1 ? a1 : a2;
            let currentVideo = activeLayer === 1 ? v1 : v2;
            let nextVideo = nextLayer === 1 ? v1 : v2;

            currentIdx = idx;
            let track = playlist[currentIdx];

            nextAudio.src = track.file;
            nextVideo.src = track.video;
            
            updateUI(track, nextLayer, isManualSkip);

            if (isManualSkip) {
                currentAudio.pause();
                currentAudio.volume = 0;
                nextAudio.volume = 1;
                if (isPlaying) {
                    nextAudio.play().catch(e=>console.log());
                    nextVideo.play().catch(e=>console.log());
                }
                activeLayer = nextLayer;
            }
        }

        // === CROSSFADE AUTOMÁTICO ===
        function startAutomaticCrossfade() {
            isCrossfading = true;
            mixingBadge.classList.add('active'); // Mostrar el cartel flotante de MIXING...

            let nextIdx = (currentIdx + 1) % playlist.length;
            let nextLayer = activeLayer === 1 ? 2 : 1;
            let currentAudio = activeLayer === 1 ? a1 : a2;
            let nextAudio = nextLayer === 1 ? a1 : a2;
            let nextVideo = nextLayer === 1 ? v1 : v2;

            let track = playlist[nextIdx];
            nextAudio.src = track.file;
            nextVideo.src = track.video;
            nextAudio.volume = 0;
            
            nextAudio.play().catch(e=>console.log());
            nextVideo.play().catch(e=>console.log());

            let startTime = performance.now();
            function fadeTick(now) {
                let elapsed = (now - startTime) / 1000;
                let progress = Math.min(elapsed / CROSSFADE_TIME, 1);

                currentAudio.volume = Math.cos(progress * 0.5 * Math.PI);
                nextAudio.volume = Math.sin(progress * 0.5 * Math.PI);

                if (progress < 1) {
                    crossfadeRafId = requestAnimationFrame(fadeTick);
                } else {
                    currentAudio.pause();
                    currentAudio.volume = 0;
                    isCrossfading = false;
                    mixingBadge.classList.remove('active'); // Ocultar cartel al terminar
                }
            }
            crossfadeRafId = requestAnimationFrame(fadeTick);

            currentIdx = nextIdx;
            activeLayer = nextLayer;
            updateUI(track, nextLayer, false);
        }

        // === UI & COLOR DINÁMICO ===
        function updateUI(track, layerNum, isManual = false) {
            document.getElementById('title').textContent = track.title;
            document.getElementById('artist').textContent = track.artist;
            document.getElementById('cover').src = track.cover;

            let videoTransition = isManual ? "0.5s" : `${CROSSFADE_TIME}s`;
            v1.style.transition = `opacity ${videoTransition} ease-in-out`;
            v2.style.transition = `opacity ${videoTransition} ease-in-out`;

            if (layerNum === 1) { v1.classList.add('active'); v2.classList.remove('active'); } 
            else { v2.classList.add('active'); v1.classList.remove('active'); }

            extractColor(track.cover);
        }

        function extractColor(imgSrc) {
            if (colorCache[imgSrc]) {
                applyColor(colorCache[imgSrc].r, colorCache[imgSrc].g, colorCache[imgSrc].b);
                return;
            }
            const img = new Image();
            img.crossOrigin = "Anonymous";
            img.onload = () => {
                const canvas = document.createElement('canvas');
                canvas.width = 1; canvas.height = 1;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, 1, 1);
                let[r, g, b] = ctx.getImageData(0, 0, 1, 1).data;
                
                let brightness = (r * 299 + g * 587 + b * 114) / 1000;
                if (brightness < 120) {
                    let factor = 140 / Math.max(brightness, 1);
                    r = Math.min(255, Math.round(r * factor));
                    g = Math.min(255, Math.round(g * factor));
                    b = Math.min(255, Math.round(b * factor));
                }

                colorCache[imgSrc] = {r, g, b};
                applyColor(r, g, b);
            };
            img.src = imgSrc;
        }

        function applyColor(r, g, b) {
            document.documentElement.style.setProperty('--accent-color', `rgb(${r}, ${g}, ${b})`);
            document.documentElement.style.setProperty('--accent-glow', `rgba(${r}, ${g}, ${b}, 0.35)`);
        }

        // === EVENTOS ===
        function togglePlay() {
            let activeAudio = activeLayer === 1 ? a1 : a2;
            let activeVideo = activeLayer === 1 ? v1 : v2;

            if (isPlaying) {
                a1.pause(); a2.pause();
                v1.pause(); v2.pause();
                document.body.classList.add('player-paused');
                document.getElementById('icon-play').style.display = 'block'; 
                document.getElementById('icon-pause').style.display = 'none';
                playBtn.classList.remove('is-playing');
            } else {
                if(a1.volume > 0) { a1.play().catch(e=>console.log()); v1.play().catch(e=>console.log()); }
                if(a2.volume > 0) { a2.play().catch(e=>console.log()); v2.play().catch(e=>console.log()); }
                document.body.classList.remove('player-paused');
                document.getElementById('icon-play').style.display = 'none'; 
                document.getElementById('icon-pause').style.display = 'block';
                playBtn.classList.add('is-playing');
            }
            isPlaying = !isPlaying;
        }

        playBtn.addEventListener('click', togglePlay);
        document.getElementById('btn-next').addEventListener('click', () => playTrack((currentIdx + 1) % playlist.length, true));
        document.getElementById('btn-prev').addEventListener('click', () => playTrack((currentIdx - 1 + playlist.length) % playlist.length, true));

        progressBar.addEventListener('input', (e) => {
            isDragging = true;
            progressBar.style.setProperty('--progress', `${e.target.value}%`);
        });
        progressBar.addEventListener('change', (e) => {
            isDragging = false;
            let activeAudio = activeLayer === 1 ? a1 : a2;
            if (activeAudio.duration) {
                activeAudio.currentTime = (e.target.value / 100) * activeAudio.duration;
            }
        });

        function formatTime(s) {
            if (isNaN(s)) return "0:00";
            let m = Math.floor(s / 60);
            let sec = Math.floor(s % 60);
            return `${m}:${sec < 10 ? '0' : ''}${sec}`;
        }

        playTrack(currentIdx, true);
    </script>
</body>
</html>
