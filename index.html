<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seamless Flow Player | Premium & Solid</title>
    <style>
        /* ================= CSS: UI PREMIUM / APPLE MUSIC STYLE ================= */
        :root {
            --primary-color: #1DB954; 
            --bg-color: #000000;
            --text-color: #FFFFFF;
            --text-secondary: #B3B3B3;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "San Francisco", "Helvetica Neue", Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden;
        }

        /* ================= FONDO DE VIDEO Y CAPAS ================= */
        .video-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2;
            background-color: #000;
        }

        .bg-video {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover;
            filter: brightness(0.5) saturate(1.3) blur(12px);
            transform: scale(1.1); /* Evita bordes negros por el blur */
            transition: opacity 0.8s ease;
        }

        .vignette-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            /* Combinación de gradiente radial y lineal para más profundidad */
            background: radial-gradient(circle at center, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.85) 100%),
                        linear-gradient(to bottom, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.6) 100%);
            z-index: -1;
            pointer-events: none;
        }

        /* ================= CONTENEDOR PRINCIPAL (GLASSMORPHISM) ================= */
        .player-container {
            width: 90%; 
            max-width: 380px; 
            padding: 40px 32px;
            background: rgba(25, 25, 25, 0.4);
            backdrop-filter: blur(45px) saturate(180%);
            -webkit-backdrop-filter: blur(45px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 44px;
            box-shadow: 0 50px 100px rgba(0, 0, 0, 0.6), inset 0 1px 2px rgba(255,255,255,0.15);
            text-align: center;
            transition: box-shadow 1s ease, transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            z-index: 10;
        }

        /* ================= PORTADA ================= */
        .cover-wrapper {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 28px; 
            overflow: hidden;
            margin-bottom: 35px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            transition: transform 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.2), box-shadow 1s ease;
            position: relative;
        }

        .cover-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.2);
        }

        /* Estado en pausa */
        .paused .cover-wrapper {
            transform: scale(0.82);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3) !important;
            border-radius: 36px;
        }

        .paused .cover-wrapper img {
            transform: scale(1.1); /* Efecto zoom inverso suave */
        }

        /* ================= INFO CANCIÓN ================= */
        .song-info {
            margin-bottom: 28px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .song-title {
            font-size: 26px;
            font-weight: 800;
            letter-spacing: -0.6px;
            text-shadow: 0 2px 8px rgba(0,0,0,0.4);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #FFFFFF;
        }

        .song-artist {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.65);
            font-weight: 500;
            letter-spacing: 0.3px;
            text-shadow: 0 1px 4px rgba(0,0,0,0.2);
        }

        /* ================= BARRA DE PROGRESO ================= */
        .progress-container {
            width: 100%;
            margin-bottom: 32px;
            position: relative;
        }

        .progress-slider {
            -webkit-appearance: none;
            width: 100%;
            height: 6px; 
            background: rgba(255, 255, 255, 0.15);
            background-image: linear-gradient(var(--primary-color), var(--primary-color));
            background-size: var(--progress, 0%) 100%;
            background-repeat: no-repeat;
            border-radius: 4px;
            outline: none;
            cursor: pointer;
            transition: height 0.2s ease;
        }

        /* Thumb (bolita) más elegante, aparece al tocar/hover */
        .progress-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #fff;
            box-shadow: 0 2px 8px rgba(0,0,0,0.4);
            opacity: 0.5;
            transform: scale(0.6); 
            transition: opacity 0.25s ease, transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .progress-container:hover .progress-slider,
        .progress-slider:active {
            height: 8px; /* Engrosa un poco la barra al interactuar */
        }

        .progress-container:hover .progress-slider::-webkit-slider-thumb,
        .progress-slider:active::-webkit-slider-thumb {
            opacity: 1;
            transform: scale(1.1); 
        }

        .time-info {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.55);
            margin-top: 12px;
            font-weight: 600;
            font-variant-numeric: tabular-nums; /* Números fijos para que no baile el UI */
            letter-spacing: 0.5px;
        }

        /* ================= CONTROLES ================= */
        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .btn {
            background: transparent;
            border: none;
            cursor: pointer;
            color: rgba(255, 255, 255, 0.5);
            transition: all 0.25s cubic-bezier(0.25, 1, 0.5, 1);
            display: flex;
            justify-content: center;
            align-items: center;
            width: 48px;
            height: 48px;
            border-radius: 50%; /* Preparado para el hover */
        }

        .btn:hover {
            color: #FFF;
            background-color: rgba(255, 255, 255, 0.08); /* Feedback de área interactiva */
            transform: scale(1.05);
        }

        .btn:active {
            transform: scale(0.9);
            background-color: rgba(255, 255, 255, 0.15);
        }

        .btn svg {
            width: 22px;
            height: 22px;
            fill: currentColor;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.15));
        }

        /* Botón Play Premium */
        .btn-play {
            width: 70px; 
            height: 70px;
            background-color: var(--primary-color);
            color: #000;
            border-radius: 50%;
            transition: all 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 8px 25px rgba(0,0,0,0.3), inset 0 2px 4px rgba(255,255,255,0.3);
            flex-shrink: 0;
            margin: 0 10px;
        }

        .btn-play:hover {
            transform: scale(1.08);
            background-color: var(--primary-color);
            color: #000;
            box-shadow: 0 12px 35px rgba(0,0,0,0.4), inset 0 2px 4px rgba(255,255,255,0.4);
        }

        .btn-play:active {
            transform: scale(0.92);
        }

        .btn-play svg {
            width: 30px;
            height: 30px;
            filter: none;
        }

        #play-icon {
            transform: translateX(2px); /* Centrado visual geométrico */
        }

        .active-action {
            color: var(--primary-color);
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.2));
        }
        .active-action:hover {
            color: var(--primary-color);
        }
    </style>
</head>
<body>

    <div class="video-container">
        <video id="bg-video-1" class="bg-video" autoplay loop muted playsinline></video>
        <video id="bg-video-2" class="bg-video" autoplay loop muted playsinline style="opacity: 0;"></video>
        <div class="vignette-overlay"></div>
    </div>

    <div class="player-container paused" id="player">
        <div class="cover-wrapper" id="cover-glow">
            <img src="" id="cover" crossorigin="anonymous">
        </div>
        
        <div class="song-info">
            <div class="song-title" id="title">Cargando...</div>
            <div class="song-artist" id="artist">Cargando...</div>
        </div>

        <div class="progress-container">
            <input type="range" class="progress-slider" id="progress-slider" min="0" max="100" step="0.1" value="0">
            <div class="time-info">
                <span id="current-time">0:00</span>
                <span id="duration">0:00</span>
            </div>
        </div>

        <div class="controls">
            <button class="btn" id="btn-shuffle" title="Modo Aleatorio">
                <svg viewBox="0 0 24 24"><path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/></svg>
            </button>
            <button class="btn" id="btn-prev" title="Anterior">
                <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
            </button>
            <button class="btn btn-play" id="btn-play" title="Reproducir / Pausar">
                <svg id="play-icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                <svg id="pause-icon" viewBox="0 0 24 24" style="display:none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
            </button>
            <button class="btn" id="btn-next" title="Siguiente">
                <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
            </button>
            <button class="btn" id="btn-repeat" title="Repetir Canción">
                <svg viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg>
            </button>
        </div>
    </div>

    <script>
        /* ================= CONFIGURACIÓN DE TU PLAYLIST ================= */
        const playlist =[
            { 
                title: "WOH OH OH", 
                artist: "Tu Artista", 
                cover: "covers/WOH OH OH.jpg", 
                file: "songs/WOH OH OH.mp3",
                video: "videos/WOH OH OH.mp4"
            },
            { 
                title: "444", 
                artist: "Tu Artista", 
                cover: "covers/444.jpg", 
                file: "songs/444.mp3",
                video: "videos/444.mp4"
            },
            { 
                title: "FOREVEL TU GANTEL", 
                artist: "Tu Artista", 
                cover: "covers/FOREVEL TU GANTEL.jpg", 
                file: "songs/FOREVEL TU GANTEL.mp3",
                video: "videos/FOREVEL TU GANTEL.mp4"
            },
            { 
                title: "YO QUIERO", 
                artist: "Tu Artista", 
                cover: "covers/YO QUIERO.jpg", 
                file: "songs/YO QUIERO.mp3",
                video: "videos/YO QUIERO.mp4"
            },
            { 
                title: "VVS SWITCH REMIX", 
                artist: "Tu Artista", 
                cover: "covers/VVS SWITCH REMIX.jpg", 
                file: "songs/VVS SWITCH REMIX.mp3",
                video: "videos/VVS SWITCH REMIX.mp4"
            },
            { 
                title: "FALSAS PROMESAS REMIX", 
                artist: "Tu Artista", 
                cover: "covers/FALSAS PROMESAS REMIX.jpg", 
                file: "songs/FALSAS PROMESAS REMIX.mp3",
                video: "videos/FALSAS PROMESAS REMIX.mp4"
            }
        ];

        /* ================= ESTADO DEL REPRODUCTOR ================= */
        let currentIndex = 0;
        let isPlaying = false;
        let isShuffle = false;
        let isRepeat = false; 
        let isDragging = false; 

        // Crossfade Settings - CONFIGURADO A 12 SEGUNDOS
        const CROSSFADE_DURATION = 12; 
        let isCrossfading = false;
        let crossfadeInterval = null;

        // Motores Duales
        let audioMain = new Audio();
        let audioNext = new Audio();
        let videoMain = document.getElementById('bg-video-1');
        let videoNext = document.getElementById('bg-video-2');

        const coverEl = document.getElementById('cover');
        const titleEl = document.getElementById('title');
        const artistEl = document.getElementById('artist');
        const rootVars = document.documentElement.style;
        const coverGlow = document.getElementById('cover-glow');

        const slider = document.getElementById('progress-slider');
        const currTimeEl = document.getElementById('current-time');
        const durationEl = document.getElementById('duration');

        function formatTime(sec) {
            if (isNaN(sec)) return "0:00";
            let min = Math.floor(sec / 60);
            let s = Math.floor(sec % 60);
            return `${min}:${s < 10 ? '0' : ''}${s}`;
        }

        function resetProgressUI() {
            slider.value = 0;
            slider.style.setProperty('--progress', '0%');
            currTimeEl.textContent = "0:00";
            durationEl.textContent = "0:00";
        }

        function loadSongInfo(index) {
            const song = playlist[index];
            coverEl.src = song.cover;
            titleEl.textContent = song.title;
            artistEl.textContent = song.artist;
        }

        function initPlayer() {
            loadSongInfo(currentIndex);
            
            audioMain.src = playlist[currentIndex].file;
            videoMain.src = playlist[currentIndex].video;
            
            forceStopCrossfade(); // Limpieza absoluta antes de iniciar
            resetProgressUI();
        }

        /* ================= EVENTOS DE AUDIO ================= */
        function setupAudioListeners(audioElement) {
            audioElement.addEventListener('timeupdate', (e) => {
                if (e.target !== audioMain) return;
                if (!audioMain.duration) return;

                const currentTime = audioMain.currentTime;
                const duration = audioMain.duration;

                if (!isDragging && Math.abs(videoMain.currentTime - currentTime) > 0.3) {
                    videoMain.currentTime = currentTime;
                }
                
                if (!isDragging) {
                    const percent = (currentTime / duration) * 100;
                    slider.value = percent;
                    slider.style.setProperty('--progress', `${percent}%`);
                    currTimeEl.textContent = formatTime(currentTime);
                }

                // Iniciar mezcla automática cuando falten 12 segundos
                if (duration - currentTime <= CROSSFADE_DURATION && !isCrossfading && duration > 0) {
                    startSmartCrossfade(true); 
                }
            });

            audioElement.addEventListener('loadedmetadata', (e) => {
                if (e.target !== audioMain) return;
                durationEl.textContent = formatTime(audioMain.duration);
            });
        }

        setupAudioListeners(audioMain);
        setupAudioListeners(audioNext);

        /* ================= EXTRACCIÓN DE COLOR DINÁMICA ================= */
        coverEl.onload = function() {
            const canvas = document.createElement('canvas');
            const context = canvas.getContext('2d');
            canvas.width = coverEl.width || 1;
            canvas.height = coverEl.height || 1;
            
            try {
                context.drawImage(coverEl, 0, 0, canvas.width, canvas.height);
                const data = context.getImageData(0, 0, canvas.width, canvas.height).data;
                let r = 0, g = 0, b = 0;
                
                for (let i = 0; i < data.length; i += 16) { 
                    r += data[i]; g += data[i+1]; b += data[i+2];
                }
                const count = data.length / 16;
                r = Math.floor(r / count); g = Math.floor(g / count); b = Math.floor(b / count);

                rootVars.setProperty('--primary-color', `rgb(${r}, ${g}, ${b})`);
                // Modificado para un brillo más difuso y de calidad premium
                coverGlow.style.boxShadow = `0 20px 60px rgba(${r}, ${g}, ${b}, 0.35)`;
            } catch (e) {
                rootVars.setProperty('--primary-color', '#1DB954');
                coverGlow.style.boxShadow = `0 20px 60px rgba(29, 185, 84, 0.35)`;
            }
        };

        /* ================= BARRA DE PROGRESO ================= */
        slider.addEventListener('input', () => {
            isDragging = true;
            if (!audioMain.duration) return;
            const seekTime = (slider.value / 100) * audioMain.duration;
            currTimeEl.textContent = formatTime(seekTime);
            slider.style.setProperty('--progress', `${slider.value}%`);
        });

        slider.addEventListener('change', () => {
            if (!audioMain.duration) return;
            const seekTime = (slider.value / 100) * audioMain.duration;
            
            audioMain.currentTime = seekTime;
            videoMain.currentTime = seekTime; 
            isDragging = false;

            // Si adelantamos la canción y caemos en zona de crossfade o lo interrumpimos, abortamos errores
            if (audioMain.duration - audioMain.currentTime > CROSSFADE_DURATION) {
                forceStopCrossfade();
            }
        });

        /* ================= MOTOR DE MEZCLA DJ ================= */
        function getNextIndex(isAuto = false) {
            if (isAuto && isRepeat) return currentIndex; 
            if (isShuffle) {
                let next;
                do { next = Math.floor(Math.random() * playlist.length); } 
                while (next === currentIndex && playlist.length > 1);
                return next;
            }
            return (currentIndex + 1) % playlist.length;
        }

        function forceStopCrossfade() {
            if (crossfadeInterval) {
                clearInterval(crossfadeInterval);
                crossfadeInterval = null;
            }
            isCrossfading = false;
            
            audioNext.pause();
            videoNext.pause();
            audioNext.volume = 0;
            videoNext.style.opacity = '0';
            
            audioMain.volume = 1;
            videoMain.style.opacity = '1';
        }

        function startSmartCrossfade(isAuto = true) {
            if (isCrossfading) return;
            
            isCrossfading = true;
            let nextIdx = getNextIndex(isAuto);
            
            let outgoingAudio = audioMain;
            let outgoingVideo = videoMain;
            
            audioMain = audioNext;
            videoMain = videoNext;
            audioNext = outgoingAudio;
            videoNext = outgoingVideo;

            audioMain.src = playlist[nextIdx].file;
            videoMain.src = playlist[nextIdx].video;
            audioMain.volume = 0;
            audioMain.currentTime = 0;
            videoMain.currentTime = 0;

            resetProgressUI();
            
            audioMain.play().catch(e => console.log(e));
            videoMain.play().catch(e => console.log(e));

            currentIndex = nextIdx;
            loadSongInfo(currentIndex);

            let startTime = Date.now();
            let durationMs = CROSSFADE_DURATION * 1000; 

            if (crossfadeInterval) clearInterval(crossfadeInterval);

            crossfadeInterval = setInterval(() => {
                let elapsed = Date.now() - startTime;
                let t = Math.min(elapsed / durationMs, 1); 
                
                audioMain.volume = Math.min(1, Math.max(0, Math.sin(t * 0.5 * Math.PI)));
                audioNext.volume = Math.min(1, Math.max(0, Math.cos(t * 0.5 * Math.PI)));
                
                videoMain.style.opacity = t;
                videoNext.style.opacity = 1 - t;

                if (t >= 1) {
                    forceStopCrossfade();
                }
            }, 50);
        }

        /* ================= BOTONES Y CONTROLES ================= */
        const playBtn = document.getElementById('btn-play');
        const playIcon = document.getElementById('play-icon');
        const pauseIcon = document.getElementById('pause-icon');
        const playerContainer = document.getElementById('player');

        function togglePlay() {
            if (isPlaying) {
                audioMain.pause(); videoMain.pause();
                if (isCrossfading) { audioNext.pause(); videoNext.pause(); }
                
                playIcon.style.display = 'block';
                pauseIcon.style.display = 'none';
                playerContainer.classList.add('paused');
            } else {
                audioMain.play(); videoMain.play().catch(e=>console.log(e));
                if (isCrossfading) { audioNext.play(); videoNext.play(); }
                
                playIcon.style.display = 'none';
                pauseIcon.style.display = 'block';
                playerContainer.classList.remove('paused');
            }
            isPlaying = !isPlaying;
        }

        playBtn.addEventListener('click', togglePlay);

        function playManual(index) {
            forceStopCrossfade(); 
            currentIndex = index;
            initPlayer();
            
            if(isPlaying) {
                audioMain.play();
                videoMain.play();
            }
        }

        document.getElementById('btn-next').addEventListener('click', () => {
            playManual(getNextIndex(false)); 
        });

        document.getElementById('btn-prev').addEventListener('click', () => {
            if (audioMain.currentTime > 3) {
                audioMain.currentTime = 0; 
                videoMain.currentTime = 0;
            } else {
                playManual((currentIndex - 1 + playlist.length) % playlist.length);
            }
        });

        document.getElementById('btn-shuffle').addEventListener('click', function() {
            isShuffle = !isShuffle;
            this.classList.toggle('active-action', isShuffle);
        });

        document.getElementById('btn-repeat').addEventListener('click', function() {
            isRepeat = !isRepeat;
            this.classList.toggle('active-action', isRepeat);
        });

        // Iniciar
        initPlayer();
    </script>
</body>
</html>
