<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seamless Flow Player | Pro Version</title>
    <style>
        /* ================= CSS: UI APPLE/SPOTIFY INSPIRADA ================= */
        :root {
            --primary-color: #1DB954; 
            --bg-color: #000000;
            --text-color: #FFFFFF;
            --text-secondary: #B3B3B3;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "San Francisco", "Helvetica Neue", Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden;
        }

        /* Video de Fondo */
        .video-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background-color: #000;
        }

        .bg-video {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover;
            filter: brightness(0.3) blur(5px);
            transform: scale(1.05);
            transition: opacity 0.5s ease;
        }

        /* Contenedor principal Glassmorphism */
        .player-container {
            width: 380px;
            padding: 35px 30px;
            background: rgba(30, 30, 30, 0.4);
            backdrop-filter: blur(40px) saturate(150%);
            -webkit-backdrop-filter: blur(40px) saturate(150%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 40px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255,255,255,0.1);
            text-align: center;
            transition: box-shadow 1s ease;
        }

        .cover-wrapper {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 24px;
            overflow: hidden;
            margin-bottom: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1), box-shadow 1s ease;
        }

        .cover-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .paused .cover-wrapper {
            transform: scale(0.85);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3) !important;
        }

        .song-info {
            margin-bottom: 25px;
        }

        .song-title {
            font-size: 26px;
            font-weight: 800;
            margin-bottom: 6px;
            letter-spacing: -0.5px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .song-artist {
            font-size: 16px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        /* Barra de progreso */
        .progress-container {
            width: 100%;
            margin-bottom: 30px;
        }

        .progress-slider {
            -webkit-appearance: none;
            width: 100%;
            height: 6px;
            background: linear-gradient(to right, var(--primary-color) var(--progress, 0%), rgba(255, 255, 255, 0.15) var(--progress, 0%));
            border-radius: 3px;
            outline: none;
            cursor: pointer;
            transition: height 0.2s ease;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }

        .progress-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #fff;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
            opacity: 0;
            transition: opacity 0.2s ease, transform 0.1s ease;
        }

        .progress-container:hover .progress-slider::-webkit-slider-thumb {
            opacity: 1;
        }

        .progress-slider::-webkit-slider-thumb:hover {
            transform: scale(1.3);
        }

        .time-info {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 10px;
            font-weight: 500;
            font-variant-numeric: tabular-nums;
        }

        /* ================= CONTROLES SIMÉTRICOS ================= */
        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .btn {
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-secondary);
            transition: all 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 44px;
            height: 44px;
        }

        .btn:hover {
            color: #FFF;
            transform: scale(1.1);
        }

        .btn svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
        }

        .btn-play {
            width: 68px; 
            height: 68px;
            background-color: var(--primary-color);
            color: #000;
            border-radius: 50%;
            transition: background-color 1s ease, transform 0.1s ease;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            flex-shrink: 0;
        }

        .btn-play:hover {
            transform: scale(1.05);
            color: #000;
        }

        .btn-play:active {
            transform: scale(0.95);
        }

        .btn-play svg {
            width: 32px;
            height: 32px;
            filter: none;
        }

        #play-icon {
            transform: translateX(2px);
        }

        .active-action {
            color: var(--primary-color);
            filter: drop-shadow(0 0 5px rgba(29, 185, 84, 0.4));
        }
    </style>
</head>
<body>

    <div class="video-container">
        <video id="bg-video-1" class="bg-video" autoplay loop muted playsinline></video>
        <video id="bg-video-2" class="bg-video" autoplay loop muted playsinline style="opacity: 0;"></video>
    </div>

    <div class="player-container paused" id="player">
        <div class="cover-wrapper" id="cover-glow">
            <img src="" id="cover" crossorigin="anonymous">
        </div>
        
        <div class="song-info">
            <div class="song-title" id="title">Cargando...</div>
            <div class="song-artist" id="artist">Cargando...</div>
        </div>

        <div class="progress-container">
            <input type="range" class="progress-slider" id="progress-slider" min="0" max="100" step="0.1" value="0">
            <div class="time-info">
                <span id="current-time">0:00</span>
                <span id="duration">0:00</span>
            </div>
        </div>

        <div class="controls">
            <!-- Aleatorio -->
            <button class="btn" id="btn-shuffle" title="Modo Aleatorio">
                <svg viewBox="0 0 24 24"><path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/></svg>
            </button>
            <!-- Anterior -->
            <button class="btn" id="btn-prev" title="Anterior">
                <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
            </button>
            <!-- Reproducir -->
            <button class="btn btn-play" id="btn-play" title="Reproducir / Pausar">
                <svg id="play-icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                <svg id="pause-icon" viewBox="0 0 24 24" style="display:none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
            </button>
            <!-- Siguiente -->
            <button class="btn" id="btn-next" title="Siguiente">
                <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
            </button>
            <!-- Repetir -->
            <button class="btn" id="btn-repeat" title="Repetir Canción">
                <svg viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg>
            </button>
        </div>
    </div>

    <script>
        /* ================= CONFIGURACIÓN DE TU PLAYLIST ================= */
        const playlist =[
            { 
                title: "WOH OH OH", 
                artist: "OMAR COURTZ, ROA", 
                cover: "covers/WOH OH OH.jpg", 
                file: "songs/WOH OH OH.mp3",
                video: "videos/WOH OH OH.mp4"
            },
            { 
                title: "444", 
                artist: "Yan Block", 
                cover: "covers/444.jpg", 
                file: "songs/444.mp3",
                video: "videos/444.mp4"
            },
            { 
                title: "FOREVEL TU GANTEL", 
                artist: "OMAR COURTZ, NENGO FLOW", 
                cover: "covers/FOREVEL TU GANTEL.jpg", 
                file: "songs/FOREVEL TU GANTEL.mp3",
                video: "videos/FOREVEL TU GANTEL.mp4"
            },
            // NUEVA CANCIÓN AGREGADA AQUÍ:
            { 
                title: "YO QUIERO", 
                artist: "HADES66", 
                cover: "covers/YO QUIERO.jpg", 
                file: "songs/YO QUIERO.mp3",
                video: "videos/YO QUIERO.mp4"
            }
        ];

        /* ================= ESTADO DEL REPRODUCTOR ================= */
        let currentIndex = 0;
        let isPlaying = false;
        let isShuffle = false;
        let isRepeat = false; 
        
        let isCrossfading = false;
        let fadeInterval = null;
        let isDragging = false; 
        const CROSSFADE_DURATION = 6; 

        // Motores Duales
        let audioMain = new Audio();
        let audioNext = new Audio();
        let videoMain = document.getElementById('bg-video-1');
        let videoNext = document.getElementById('bg-video-2');

        const coverEl = document.getElementById('cover');
        const titleEl = document.getElementById('title');
        const artistEl = document.getElementById('artist');
        const rootVars = document.documentElement.style;
        const coverGlow = document.getElementById('cover-glow');

        const slider = document.getElementById('progress-slider');
        const currTimeEl = document.getElementById('current-time');
        const durationEl = document.getElementById('duration');

        function formatTime(sec) {
            if (isNaN(sec)) return "0:00";
            let min = Math.floor(sec / 60);
            let s = Math.floor(sec % 60);
            return `${min}:${s < 10 ? '0' : ''}${s}`;
        }

        function resetProgressUI() {
            slider.value = 0;
            slider.style.setProperty('--progress', '0%');
            currTimeEl.textContent = "0:00";
            durationEl.textContent = "0:00";
        }

        function initPlayer() {
            loadSongInfo(currentIndex);
            
            audioMain.src = playlist[currentIndex].file;
            videoMain.src = playlist[currentIndex].video;
            audioMain.volume = 1;

            videoMain.style.transition = 'opacity 0.3s ease';
            videoMain.style.opacity = '1';
            videoNext.style.opacity = '0';

            resetProgressUI();
        }

        function loadSongInfo(index) {
            const song = playlist[index];
            coverEl.src = song.cover;
            titleEl.textContent = song.title;
            artistEl.textContent = song.artist;
        }

        /* ================= EVENTOS DE AUDIO ================= */
        function setupAudioListeners(audioElement) {
            audioElement.addEventListener('timeupdate', (e) => {
                if (e.target !== audioMain) return;
                if (!audioMain.duration) return;

                const currentTime = audioMain.currentTime;
                const duration = audioMain.duration;

                if (!isDragging && Math.abs(videoMain.currentTime - currentTime) > 0.3) {
                    videoMain.currentTime = currentTime;
                }
                
                if (!isDragging) {
                    const percent = (currentTime / duration) * 100;
                    slider.value = percent;
                    slider.style.setProperty('--progress', `${percent}%`);
                    currTimeEl.textContent = formatTime(currentTime);
                }

                if (duration - currentTime <= CROSSFADE_DURATION && !isCrossfading && duration > 0) {
                    startSmartCrossfade(true); 
                }
            });

            audioElement.addEventListener('ended', (e) => {
                if (e.target !== audioMain) return;
                if (!isCrossfading) playManual(getNextIndex(true)); 
            });

            audioElement.addEventListener('loadedmetadata', (e) => {
                if (e.target !== audioMain) return;
                durationEl.textContent = formatTime(audioMain.duration);
            });
        }

        setupAudioListeners(audioMain);
        setupAudioListeners(audioNext);

        /* ================= EXTRACCIÓN DE COLOR ================= */
        coverEl.onload = function() {
            const canvas = document.createElement('canvas');
            const context = canvas.getContext('2d');
            canvas.width = coverEl.width || 1;
            canvas.height = coverEl.height || 1;
            
            try {
                context.drawImage(coverEl, 0, 0, canvas.width, canvas.height);
                const data = context.getImageData(0, 0, canvas.width, canvas.height).data;
                let r = 0, g = 0, b = 0;
                
                for (let i = 0; i < data.length; i += 16) { 
                    r += data[i]; g += data[i+1]; b += data[i+2];
                }
                const count = data.length / 16;
                r = Math.floor(r / count); g = Math.floor(g / count); b = Math.floor(b / count);

                const rgb = `rgb(${r}, ${g}, ${b})`;
                rootVars.setProperty('--primary-color', rgb);
                coverGlow.style.boxShadow = `0 20px 50px rgba(${r}, ${g}, ${b}, 0.5)`;
            } catch (e) {
                rootVars.setProperty('--primary-color', '#1DB954');
                coverGlow.style.boxShadow = `0 20px 50px rgba(29, 185, 84, 0.4)`;
            }
        };

        /* ================= BARRA DE PROGRESO ================= */
        slider.addEventListener('input', () => {
            isDragging = true;
            if (!audioMain.duration) return;
            const seekTime = (slider.value / 100) * audioMain.duration;
            currTimeEl.textContent = formatTime(seekTime);
            slider.style.setProperty('--progress', `${slider.value}%`);
        });

        slider.addEventListener('change', () => {
            if (!audioMain.duration) {
                isDragging = false;
                return;
            }
            const seekTime = (slider.value / 100) * audioMain.duration;
            
            audioMain.currentTime = seekTime;
            videoMain.currentTime = seekTime; 
            
            isDragging = false;

            if (isCrossfading && (audioMain.duration - audioMain.currentTime > CROSSFADE_DURATION)) {
                cancelCrossfade();
            }
        });

        /* ================= LÓGICA DE REPRODUCCIÓN ================= */
        function getNextIndex(isAuto = false) {
            if (isAuto && isRepeat) return currentIndex; 

            if (isShuffle) {
                let next;
                do { next = Math.floor(Math.random() * playlist.length); } 
                while (next === currentIndex && playlist.length > 1);
                return next;
            }
            return (currentIndex + 1) % playlist.length;
        }

        function startSmartCrossfade(isAuto = true) {
            isCrossfading = true;
            let nextIdx = getNextIndex(isAuto);
            
            let oldAudio = audioMain; audioMain = audioNext; audioNext = oldAudio;
            let oldVideo = videoMain; videoMain = videoNext; videoNext = oldVideo;

            audioMain.src = playlist[nextIdx].file;
            videoMain.src = playlist[nextIdx].video;
            audioMain.volume = 0;
            audioMain.currentTime = 0;
            videoMain.currentTime = 0;

            resetProgressUI();
            
            videoMain.style.transition = `opacity ${CROSSFADE_DURATION}s linear`;
            videoNext.style.transition = `opacity ${CROSSFADE_DURATION}s linear`;
            
            videoMain.style.opacity = '1';
            videoNext.style.opacity = '0';
            
            audioMain.play().catch(e => console.log(e));
            videoMain.play().catch(e => console.log(e));

            currentIndex = nextIdx;
            loadSongInfo(currentIndex);

            if (fadeInterval) clearInterval(fadeInterval);
            
            fadeInterval = setInterval(() => {
                if (audioNext.volume > 0.05) audioNext.volume -= 0.05;
                else audioNext.volume = 0;

                if (audioMain.volume < 0.95) audioMain.volume += 0.05;
                else audioMain.volume = 1;

                if (audioNext.volume === 0 && audioMain.volume === 1) {
                    clearInterval(fadeInterval);
                    fadeInterval = null;
                    
                    audioNext.pause(); 
                    videoNext.pause(); 
                    isCrossfading = false;
                }
            }, (CROSSFADE_DURATION * 1000) / 20); 
        }

        function cancelCrossfade() {
            if (fadeInterval) clearInterval(fadeInterval);
            fadeInterval = null;
            isCrossfading = false;
            
            audioNext.pause();
            videoNext.pause();
            audioNext.volume = 0;
            videoNext.style.opacity = '0';
            
            audioMain.volume = 1;
            videoMain.style.opacity = '1';
        }

        /* ================= CONTROLES ================= */
        const playBtn = document.getElementById('btn-play');
        const playIcon = document.getElementById('play-icon');
        const pauseIcon = document.getElementById('pause-icon');
        const playerContainer = document.getElementById('player');

        function togglePlay() {
            if (isPlaying) {
                audioMain.pause(); videoMain.pause();
                if (isCrossfading) { audioNext.pause(); videoNext.pause(); }
                
                playIcon.style.display = 'block';
                pauseIcon.style.display = 'none';
                playerContainer.classList.add('paused');
            } else {
                audioMain.play(); videoMain.play().catch(e=>console.log(e));
                if (isCrossfading) { audioNext.play(); videoNext.play(); }
                
                playIcon.style.display = 'none';
                pauseIcon.style.display = 'block';
                playerContainer.classList.remove('paused');
            }
            isPlaying = !isPlaying;
        }

        playBtn.addEventListener('click', togglePlay);

        function playManual(index) {
            cancelCrossfade(); 
            currentIndex = index;
            initPlayer();
            
            if(isPlaying) {
                audioMain.play();
                videoMain.play();
            }
        }

        document.getElementById('btn-next').addEventListener('click', () => {
            playManual(getNextIndex(false)); 
        });

        document.getElementById('btn-prev').addEventListener('click', () => {
            if (audioMain.currentTime > 3) {
                audioMain.currentTime = 0; 
                videoMain.currentTime = 0;
            } else {
                playManual((currentIndex - 1 + playlist.length) % playlist.length);
            }
        });

        document.getElementById('btn-shuffle').addEventListener('click', function() {
            isShuffle = !isShuffle;
            this.classList.toggle('active-action', isShuffle);
        });

        document.getElementById('btn-repeat').addEventListener('click', function() {
            isRepeat = !isRepeat;
            this.classList.toggle('active-action', isRepeat);
        });

        initPlayer();
    </script>
</body>
</html>
