<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIVET - Premium Player</title>
    <style>
        /* ================= CSS: UI PREMIUM ================= */
        :root {
            --primary-color: #ffffff; 
            --primary-color-rgb: 255, 255, 255;
            --bg-color: #000000;
            --text-color: #FFFFFF;
            --text-secondary: rgba(255, 255, 255, 0.55);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden;
        }

        .video-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2;
            background-color: #111;
        }

        .bg-video {
            position: absolute;
            top: -10%; left: -10%; width: 120%; height: 120%; 
            object-fit: cover;
            filter: blur(80px) saturate(350%) brightness(0.6);
            transition: opacity 1.2s ease-in-out;
        }

        .vignette-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(180deg, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.85) 100%);
            z-index: -1;
            pointer-events: none;
        }

        .player-container {
            width: 100%; 
            max-width: 390px; 
            padding: 40px 35px;
            background: rgba(20, 20, 20, 0.25);
            backdrop-filter: blur(60px) saturate(200%);
            -webkit-backdrop-filter: blur(60px) saturate(200%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 48px;
            box-shadow: 0 50px 100px rgba(0, 0, 0, 0.8), inset 0 1px 1px rgba(255,255,255,0.15);
            text-align: center;
            z-index: 10;
        }

        .cover-wrapper {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 20px; 
            overflow: hidden;
            margin-bottom: 40px;
            box-shadow: 0 30px 80px -10px rgba(var(--primary-color-rgb), 0.85);
            transition: transform 0.6s cubic-bezier(0.32, 0.72, 0, 1), box-shadow 0.6s ease;
            position: relative;
        }

        .cover-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s cubic-bezier(0.32, 0.72, 0, 1);
        }

        .paused .cover-wrapper {
            transform: scale(0.82); 
            box-shadow: 0 15px 30px -10px rgba(var(--primary-color-rgb), 0.3) !important;
            border-radius: 28px;
        }

        .paused .cover-wrapper img { transform: scale(1.05); }

        .song-info {
            margin-bottom: 30px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            text-align: left; 
        }

        .song-title {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: #FFFFFF;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        .song-artist {
            font-size: 16px;
            color: var(--text-secondary);
            font-weight: 500;
            letter-spacing: 0.2px;
        }

        /* ================= BARRA DE PROGRESO ================= */
        .progress-container {
            width: 100%;
            margin-bottom: 40px;
            position: relative;
        }

        .progress-slider {
            -webkit-appearance: none;
            width: 100%;
            height: 6px; 
            background-color: rgba(255, 255, 255, 0.1);
            background-image: linear-gradient(90deg, rgba(var(--primary-color-rgb), 0.2) 0%, var(--primary-color) 100%);
            background-size: var(--progress, 0%) 100%;
            background-repeat: no-repeat;
            border-radius: 6px;
            outline: none;
            cursor: pointer;
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.5);
            transition: height 0.2s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .progress-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 0px; 
            height: 0px;
            border-radius: 50%;
            background: #ffffff;
            box-shadow: 0 0 10px 2px rgba(var(--primary-color-rgb), 1);
            transition: width 0.2s ease, height 0.2s ease;
        }

        .progress-container:hover .progress-slider,
        .progress-slider:active { height: 10px; }

        .progress-container:hover .progress-slider::-webkit-slider-thumb,
        .progress-slider:active::-webkit-slider-thumb {
            width: 16px; height: 16px;
        }

        .time-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 10px;
            font-weight: 600;
            font-variant-numeric: tabular-nums;
            letter-spacing: 0.5px;
            opacity: 0.8;
            position: relative; 
        }

        .time-text { transition: opacity 0.4s ease; }

        .mixing-label {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            color: var(--primary-color);
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2.5px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
            text-shadow: 0 0 15px rgba(var(--primary-color-rgb), 1);
        }

        .is-mixing .time-text { opacity: 0; }
        .is-mixing .mixing-label {
            opacity: 1;
            animation: mix-pulse 0.8s infinite alternate ease-in-out;
        }

        @keyframes mix-pulse {
            0% { opacity: 0.5; filter: brightness(1); transform: translate(-50%, -50%) scale(0.95); }
            100% { opacity: 1; filter: brightness(1.5); transform: translate(-50%, -50%) scale(1.05); }
        }

        /* ================= CONTROLES QUE ABSORBEN EL COLOR ================= */
        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            padding: 0 10px;
        }

        .btn {
            background: transparent;
            border: none;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.25, 1, 0.5, 1), color 0.5s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 12px;
        }

        .btn-nav {
            width: 44px; height: 44px;
            color: var(--primary-color);
            filter: drop-shadow(0 0 10px rgba(var(--primary-color-rgb), 0.6));
        }
        .btn-nav svg { width: 34px; height: 34px; fill: currentColor; }
        .btn-nav:hover { opacity: 1; transform: scale(1.1); filter: drop-shadow(0 0 20px rgba(var(--primary-color-rgb), 1)); }
        .btn-nav:active { transform: scale(0.9); opacity: 0.7; }

        .btn-action {
            width: 36px; height: 36px;
            color: rgba(255, 255, 255, 0.4); 
        }
        .btn-action svg { width: 22px; height: 22px; fill: currentColor; }
        
        .active-action {
            color: var(--primary-color) !important;
            filter: drop-shadow(0 0 12px rgba(var(--primary-color-rgb), 0.8));
        }

        .btn-play {
            width: 64px; height: 64px;
            color: var(--primary-color);
            filter: drop-shadow(0 0 15px rgba(var(--primary-color-rgb), 0.8));
        }
        .btn-play svg { width: 50px; height: 50px; fill: currentColor; }
        .btn-play:hover { transform: scale(1.1); filter: drop-shadow(0 0 25px rgba(var(--primary-color-rgb), 1)); }
        .btn-play:active { transform: scale(0.9); opacity: 0.7; }


        /* ================= ANIMACIONES CINEMATOGRÁFICAS ================= */
        #song-animation-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border-radius: inherit;
            pointer-events: none;
            overflow: hidden;
            z-index: 5;
            transition: opacity 0.5s ease;
            opacity: 1; 
        }

        .paused #song-animation-container { opacity: 0; }
        .paused #song-animation-container * { animation-play-state: paused !important; }

        /* --- 1. WOH OH OH: CORAZÓN ROTO EN DOS PARTES PERFECTAS --- */
        .anim-broken-heart-container {
            position: absolute; top: 50%; left: 50%; width: 80px; height: 80px;
            transform: translate(-50%, -50%);
            filter: drop-shadow(0 0 15px rgba(var(--primary-color-rgb), 0.8));
        }
        .heart-half {
            position: absolute; width: 100%; height: 100%; top: 0; left: 0;
        }
        .heart-half.left {
            clip-path: polygon(0 0, 50% 0, 50% 100%, 0 100%);
            transform-origin: 50% 100%;
            animation: break-left 4s infinite cubic-bezier(0.5, 0, 0.2, 1);
        }
        .heart-half.right {
            clip-path: polygon(50% 0, 100% 0, 100% 100%, 50% 100%);
            transform-origin: 50% 100%;
            animation: break-right 4s infinite cubic-bezier(0.5, 0, 0.2, 1);
        }
        .heart-shape {
            position: absolute; top: 25px; left: 20px; width: 40px; height: 40px;
            background: var(--primary-color);
            transform: rotate(45deg);
        }
        .heart-shape::before, .heart-shape::after {
            content: ''; position: absolute; width: 40px; height: 40px;
            background: var(--primary-color); border-radius: 50%;
        }
        .heart-shape::before { top: -20px; left: 0; }
        .heart-shape::after { top: 0; left: -20px; }

        @keyframes break-left {
            0%, 15% { transform: rotate(0deg) translate(0, 0); opacity: 1; }
            35%, 80% { transform: rotate(-15deg) translate(-10px, 15px); opacity: 0; }
            100% { transform: rotate(0deg) translate(0, 0); opacity: 1; }
        }
        @keyframes break-right {
            0%, 15% { transform: rotate(0deg) translate(0, 0); opacity: 1; }
            35%, 80% { transform: rotate(15deg) translate(10px, 15px); opacity: 0; }
            100% { transform: rotate(0deg) translate(0, 0); opacity: 1; }
        }

        /* --- 2. FOREVEL TU GANTEL: DISCO EN LA ESQUINA --- */
        .anim-disco-ball {
            position: absolute; top: 15%; left: 85%;
            font-size: 55px; 
            transform: translate(-50%, -50%);
            animation: disco-emoji-spin 8s linear infinite;
            z-index: 2;
        }
        .anim-disco-light {
            position: absolute; top: 15%; left: 85%; width: 200%; height: 200%;
            transform: translate(-50%, -50%);
            background: repeating-conic-gradient(from 0deg, rgba(var(--primary-color-rgb), 0.25) 0deg 15deg, transparent 15deg 30deg);
            animation: disco-light-spin 12s linear infinite reverse;
            mix-blend-mode: screen;
            z-index: 1;
        }
        @keyframes disco-emoji-spin { 
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            100% { transform: translate(-50%, -50%) rotate(360deg); } 
        }
        @keyframes disco-light-spin { 
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            100% { transform: translate(-50%, -50%) rotate(-360deg); } 
        }

        /* --- 3. VVS SWITCH: DESTELLOS DE LUZ (DIAMANTES REALES) --- */
        .anim-vvs-sweep {
            position: absolute; top: 0; left: -100%; width: 60%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.8), transparent);
            transform: skewX(-25deg);
            mix-blend-mode: overlay;
            animation: ice-sweep 3s infinite cubic-bezier(0.2, 0.8, 0.4, 1);
        }
        @keyframes ice-sweep {
            0% { left: -100%; }
            40%, 100% { left: 200%; }
        }
        .anim-vvs-flare-wrapper {
            position: absolute;
            transform: translate(-50%, -50%) scale(0);
            animation: ice-flare 2s infinite ease-in-out;
            mix-blend-mode: screen;
        }
        .flare-v { width: 2px; background: #fff; box-shadow: 0 0 10px #00ffff; margin: 0 auto; border-radius: 2px; }
        .flare-h { height: 2px; background: #fff; box-shadow: 0 0 10px #00ffff; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); border-radius: 2px;}
        @keyframes ice-flare {
            0% { transform: translate(-50%, -50%) scale(0) rotate(0deg); opacity: 0; }
            50% { transform: translate(-50%, -50%) scale(1) rotate(45deg); opacity: 1; filter: brightness(1.5); }
            100% { transform: translate(-50%, -50%) scale(0) rotate(90deg); opacity: 0; }
        }

        /* --- 4. YO QUIERO: ARMAS (Miras láser y disparos) --- */
        .anim-sniper {
            position: absolute; width: 70px; height: 70px;
            border: 1.5px solid rgba(255, 0, 0, 0.8); border-radius: 50%;
            box-shadow: 0 0 15px rgba(255,0,0,0.6), inset 0 0 15px rgba(255,0,0,0.3);
            mix-blend-mode: screen;
            animation: snipe-scan 4s infinite cubic-bezier(0.4, 0, 0.2, 1) alternate;
        }
        .anim-sniper::before { 
            content: ''; position: absolute; top: 50%; left: -15px; right: -15px; height: 1.5px; 
            background: rgba(255,0,0,0.9); box-shadow: 0 0 5px red;
        }
        .anim-sniper::after { 
            content: ''; position: absolute; left: 50%; top: -15px; bottom: -15px; width: 1.5px; 
            background: rgba(255,0,0,0.9); box-shadow: 0 0 5px red;
        }
        .anim-sniper-dot {
            position: absolute; top: 50%; left: 50%; width: 5px; height: 5px;
            background: #ff0000; border-radius: 50%; transform: translate(-50%, -50%);
            box-shadow: 0 0 10px 3px red;
        }
        @keyframes snipe-scan {
            0% { top: 15%; left: 15%; transform: scale(1); }
            30% { top: 60%; left: 70%; transform: scale(0.8); }
            60% { top: 75%; left: 20%; transform: scale(1.1); }
            100% { top: 25%; left: 65%; transform: scale(0.9); }
        }
        .anim-muzzle-flash {
            position: absolute; width: 150px; height: 150px;
            background: radial-gradient(circle, #ffffff 5%, #ffcc00 15%, #ff3300 35%, transparent 70%);
            mix-blend-mode: color-dodge; transform: translate(-50%, -50%);
            opacity: 0; animation: gunfire 2s infinite;
        }
        @keyframes gunfire {
            0%, 18%, 24%, 100% { opacity: 0; transform: translate(-50%, -50%) scale(0.3); }
            20%, 22% { opacity: 1; transform: translate(-50%, -50%) scale(1.5); }
        }

        /* --- 5. 444: NÚMEROS Y SIGNOS ZODIACALES FLOTANTES --- */
        .anim-zodiac-444 {
            position: absolute;
            color: rgba(var(--primary-color-rgb), 0.9); 
            font-weight: 800;
            text-shadow: 0 0 15px var(--primary-color);
            mix-blend-mode: screen;
            animation: float-mystic linear infinite;
        }
        @keyframes float-mystic {
            0% { transform: translateY(50px) scale(0.8) rotate(-10deg); opacity: 0; }
            20% { opacity: 1; }
            80% { opacity: 1; }
            100% { transform: translateY(-200px) scale(1.2) rotate(20deg); opacity: 0; }
        }

        /* --- 6. RELIGION: CRUZ LUMINOSA Y RAYOS CELESTIALES --- */
        .anim-religion {
            position: absolute; top: -30%; left: -20%; width: 140%; height: 140%;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.4) 0%, transparent 75%);
            transform-origin: top center;
            animation: divine-ray 3s infinite alternate ease-in-out;
            mix-blend-mode: overlay;
        }
        @keyframes divine-ray {
            0% { transform: rotate(-8deg) scale(1); opacity: 0.4; filter: blur(10px); }
            100% { transform: rotate(8deg) scale(1.1); opacity: 0.8; filter: blur(25px); }
        }

        .anim-cross {
            position: absolute; top: 50%; left: 50%;
            width: 6px; height: 90px;
            background: #ffffff;
            border-radius: 10px;
            box-shadow: 0 0 20px 5px rgba(var(--primary-color-rgb), 0.9), 0 0 40px rgba(255,255,255,0.6);
            animation: holy-cross 4s infinite alternate ease-in-out;
            mix-blend-mode: screen;
            z-index: 3;
        }
        .anim-cross::before {
            content: '';
            position: absolute; top: 25px; left: -25px;
            width: 56px; height: 6px;
            background: #ffffff;
            border-radius: 10px;
            box-shadow: 0 0 20px 5px rgba(var(--primary-color-rgb), 0.9), 0 0 40px rgba(255,255,255,0.6);
        }
        @keyframes holy-cross {
            0% { transform: translate(-50%, -45%) scale(0.95); opacity: 0.7; filter: brightness(1); }
            100% { transform: translate(-50%, -55%) scale(1.05); opacity: 1; filter: brightness(1.3); }
        }

        /* --- 7. FALSAS PROMESAS: LLUVIA --- */
        .anim-promesas {
            position: absolute; background: linear-gradient(to bottom, transparent, rgba(255,255,255,0.7), transparent);
            filter: blur(0.5px); mix-blend-mode: overlay;
            animation: sad-rain 0.6s linear infinite;
        }
        @keyframes sad-rain {
            0% { transform: translateY(-100%); opacity: 0; }
            30% { opacity: 1; }
            100% { transform: translateY(400px); opacity: 0; }
        }

        /* --- 8. TE VAS: CENIZAS AL VIENTO --- */
        .anim-te-vas {
            position: absolute; background: rgba(255, 200, 100, 0.8);
            box-shadow: 0 0 10px rgba(255, 150, 50, 0.8); border-radius: 50%;
            animation: float-away linear infinite;
        }
        @keyframes float-away {
            0% { transform: translate(-20px, 0) scale(0.5); opacity: 0; }
            20% { opacity: 1; }
            80% { opacity: 1; }
            100% { transform: translate(250px, -80px) scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="video-container">
        <video id="bg-video-1" class="bg-video" autoplay loop muted playsinline></video>
        <video id="bg-video-2" class="bg-video" autoplay loop muted playsinline style="opacity: 0;"></video>
        <div class="vignette-overlay"></div>
    </div>

    <div class="player-container paused" id="player">
        
        <div class="cover-wrapper" id="cover-glow">
            <img src="" id="cover">
            <div id="song-animation-container"></div>
        </div>
        
        <div class="song-info">
            <div class="song-title" id="title">Cargando...</div>
            <div class="song-artist" id="artist">Cargando...</div>
        </div>

        <div class="progress-container">
            <input type="range" class="progress-slider" id="progress-slider" min="0" max="100" step="0.1" value="0">
            <div class="time-info">
                <span id="current-time" class="time-text">0:00</span>
                <span class="mixing-label">Mixing...</span>
                <span id="duration" class="time-text">0:00</span>
            </div>
        </div>

        <div class="controls">
            <button class="btn btn-action" id="btn-shuffle" title="Modo Aleatorio">
                <svg viewBox="0 0 24 24"><path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/></svg>
            </button>
            <button class="btn btn-nav" id="btn-prev" title="Anterior">
                <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
            </button>
            
            <button class="btn btn-play" id="btn-play" title="Reproducir / Pausar">
                <svg id="play-icon" viewBox="0 0 24 24"><path d="M8 5.14v14.72a1 1 0 001.5.86l11-7.36a1 1 0 000-1.72l-11-7.36a1 1 0 00-1.5.86z"/></svg>
                <svg id="pause-icon" viewBox="0 0 24 24" style="display:none;"><path d="M6 5h3v14H6zm9 0h3v14h-3z" rx="1"/></svg>
            </button>
            
            <button class="btn btn-nav" id="btn-next" title="Siguiente">
                <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
            </button>
            <button class="btn btn-action" id="btn-repeat" title="Repetir Canción">
                <svg viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg>
            </button>
        </div>
    </div>

    <script>
        const playlist =[
            { title: "WOH OH OH", artist: "OMAR COURTZ, ROA", cover: "covers/WOH OH OH.jpg", file: "songs/WOH OH OH.mp3", video: "videos/WOH OH OH.mp4" },
            { title: "444", artist: "YAN BLOCK", cover: "covers/444.jpg", file: "songs/444.mp3", video: "videos/444.mp4" },
            { title: "FOREVEL TU GANTEL", artist: "OMAR COURTZ, NENGO FLOW", cover: "covers/FOREVEL TU GANTEL.jpg", file: "songs/FOREVEL TU GANTEL.mp3", video: "videos/FOREVEL TU GANTEL.mp4" },
            { title: "YO QUIERO", artist: "HADES66", cover: "covers/YO QUIERO.jpg", file: "songs/YO QUIERO.mp3", video: "videos/YO QUIERO.mp4" },
            { title: "VVS SWITCH REMIX", artist: "PRESSURE, YVNGCHIMI, CDOBLETA. HADES66, ANUEL AA, LUAR LA L", cover: "covers/VVS SWITCH REMIX.jpg", file: "songs/VVS SWITCH REMIX.mp3", video: "videos/VVS SWITCH REMIX.mp4" },
            { title: "FALSAS PROMESAS REMIX", artist: "MIDNVGHT, MORA, ELADIO CARRION, ROA, CLARENT", cover: "covers/FALSAS PROMESAS REMIX.jpg", file: "songs/FALSAS PROMESAS REMIX.mp3", video: "videos/FALSAS PROMESAS REMIX.mp4" },
            { title: "TE VAS", artist: "OZUNA", cover: "covers/TE VAS.jpg", file: "songs/TE VAS.mp3", video: "videos/TE VAS.mp4" },
            { title: "RELIGION", artist: "ARTISTA", cover: "covers/RELIGION.jpg", file: "songs/RELIGION.mp3", video: "videos/RELIGION.mp4" }
        ];

        let currentIndex = 0;
        let isPlaying = false;
        let isShuffle = false;
        let isRepeat = false; 
        let isDragging = false; 

        const CROSSFADE_DURATION = 12; 
        let isCrossfading = false;
        let crossfadeInterval = null;

        let audioMain = new Audio();
        let audioNext = new Audio();
        let videoMain = document.getElementById('bg-video-1');
        let videoNext = document.getElementById('bg-video-2');

        const coverEl = document.getElementById('cover');
        const titleEl = document.getElementById('title');
        const artistEl = document.getElementById('artist');
        const rootVars = document.documentElement.style;
        const coverGlow = document.getElementById('cover-glow');
        const slider = document.getElementById('progress-slider');
        const currTimeEl = document.getElementById('current-time');
        const durationEl = document.getElementById('duration');
        const playerContainer = document.getElementById('player');
        const animContainer = document.getElementById('song-animation-container');

        function formatTime(sec) {
            if (isNaN(sec)) return "0:00";
            let min = Math.floor(sec / 60);
            let s = Math.floor(sec % 60);
            return `${min}:${s < 10 ? '0' : ''}${s}`;
        }

        function resetProgressUI() {
            slider.value = 0;
            slider.style.setProperty('--progress', '0%');
            currTimeEl.textContent = "0:00";
            durationEl.textContent = "0:00";
        }

        /* LÓGICA DE INYECCIÓN DE ANIMACIONES */
        function loadSongInfo(index) {
            const song = playlist[index];
            coverEl.src = song.cover;
            titleEl.textContent = song.title;
            artistEl.textContent = song.artist;

            const songTitle = song.title.toUpperCase();
            let html = '';

            // 1. WOH OH OH: Corazón roto en 2 partes
            if (songTitle.includes("WOH OH OH")) {
                html = `
                    <div class="anim-broken-heart-container">
                        <div class="heart-half left"><div class="heart-shape"></div></div>
                        <div class="heart-half right"><div class="heart-shape"></div></div>
                    </div>
                `;
            } 
            // 2. 444: Números "444" y Signos Zodiacales flotando
            else if (songTitle.includes("444")) {
                const signs =["444", "♈", "♉", "♊", "♋", "♌", "♍", "♎", "♏", "♐", "♑", "♒", "♓"];
                for(let i=0; i<12; i++) {
                    let left = 5 + Math.random() * 85;
                    let delay = Math.random() * 4;
                    let duration = 6 + Math.random() * 4;
                    let size = 25 + Math.random() * 20;
                    let content = signs[Math.floor(Math.random() * signs.length)];
                    html += `<div class="anim-zodiac-444" style="left: ${left}%; font-size: ${size}px; animation-delay: ${delay}s; animation-duration: ${duration}s; bottom: -20%;">${content}</div>`;
                }
            }
            // 3. FOREVEL TU GANTEL: Bola de disco en la esquina
            else if (songTitle.includes("FOREVEL TU GANTEL")) {
                html = `
                    <div class="anim-disco-light"></div>
                    <div class="anim-disco-ball">🪩</div>
                `;
            }
            // 4. YO QUIERO: Armas
            else if (songTitle.includes("YO QUIERO")) {
                html = `
                    <div class="anim-sniper" style="animation-delay: 0s;"><div class="anim-sniper-dot"></div></div>
                    <div class="anim-sniper" style="animation-delay: -2s; animation-duration: 5s;"><div class="anim-sniper-dot"></div></div>
                    <div class="anim-muzzle-flash" style="top: 30%; left: 70%; animation-delay: 0.5s;"></div>
                    <div class="anim-muzzle-flash" style="top: 80%; left: 40%; animation-delay: 1.2s;"></div>
                `;
            }
            // 5. VVS SWITCH: Diamantes y hielo cruzado
            else if (songTitle.includes("VVS SWITCH")) {
                html = `<div class="anim-vvs-sweep"></div>`;
                for(let i=0; i<6; i++) {
                    let left = 5 + Math.random() * 90;
                    let top = 5 + Math.random() * 90;
                    let delay = Math.random() * 2;
                    let size = 20 + Math.random() * 30;
                    html += `<div class="anim-vvs-flare-wrapper" style="left: ${left}%; top: ${top}%; animation-delay: ${delay}s;">
                                <div class="flare-v" style="height: ${size}px;"></div>
                                <div class="flare-h" style="width: ${size}px;"></div>
                             </div>`;
                }
            }
            // 6. FALSAS PROMESAS: Lluvia triste
            else if (songTitle.includes("FALSAS PROMESAS")) {
                for(let i=0; i<20; i++) {
                    let left = Math.random() * 100;
                    let delay = Math.random() * 1;
                    let duration = 0.4 + Math.random() * 0.3;
                    let height = 30 + Math.random() * 50;
                    html += `<div class="anim-promesas" style="left: ${left}%; width: 2px; height: ${height}px; animation-delay: ${delay}s; animation-duration: ${duration}s;"></div>`;
                }
            }
            // 7. TE VAS: Cenizas
            else if (songTitle.includes("TE VAS")) {
                for(let i=0; i<15; i++) {
                    let top = 20 + Math.random() * 60;
                    let size = 2 + Math.random() * 5; 
                    let delay = Math.random() * 3;
                    let duration = 3 + Math.random() * 3;
                    html += `<div class="anim-te-vas" style="top: ${top}%; left: -10%; width: ${size}px; height: ${size}px; animation-delay: ${delay}s; animation-duration: ${duration}s;"></div>`;
                }
            }
            // 8. RELIGION: Rayo divino + Cruz
            else if (songTitle === "RELIGION") {
                html = `
                    <div class="anim-religion"></div>
                    <div class="anim-cross"></div>
                `;
            }

            animContainer.innerHTML = html;
        }

        function initPlayer() {
            loadSongInfo(currentIndex);
            audioMain.src = playlist[currentIndex].file;
            videoMain.src = playlist[currentIndex].video;
            forceStopCrossfade(); 
            resetProgressUI();
        }

        function setupAudioListeners(audioElement) {
            audioElement.addEventListener('timeupdate', (e) => {
                if (e.target !== audioMain) return;
                if (!audioMain.duration) return;

                const currentTime = audioMain.currentTime;
                const duration = audioMain.duration;

                if (!isDragging && Math.abs(videoMain.currentTime - currentTime) > 0.3) {
                    videoMain.currentTime = currentTime;
                }
                
                if (!isDragging) {
                    const percent = (currentTime / duration) * 100;
                    slider.value = percent;
                    slider.style.setProperty('--progress', `${percent}%`);
                    currTimeEl.textContent = formatTime(currentTime);
                }

                if (duration - currentTime <= CROSSFADE_DURATION && !isCrossfading && duration > 0) {
                    startSmartCrossfade(true); 
                }
            });

            audioElement.addEventListener('loadedmetadata', (e) => {
                if (e.target !== audioMain) return;
                durationEl.textContent = formatTime(audioMain.duration);
            });
        }

        setupAudioListeners(audioMain);
        setupAudioListeners(audioNext);

        /* ================= EXTRACCIÓN DE COLOR ================= */
        coverEl.onload = function() {
            const canvas = document.createElement('canvas');
            const context = canvas.getContext('2d');
            canvas.width = coverEl.width || 1;
            canvas.height = coverEl.height || 1;
            
            try {
                context.drawImage(coverEl, 0, 0, canvas.width, canvas.height);
                const data = context.getImageData(0, 0, canvas.width, canvas.height).data;
                
                let r = 0, g = 0, b = 0, count = 0;
                
                for (let i = 0; i < data.length; i += 16) { 
                    r += data[i]; g += data[i+1]; b += data[i+2];
                    count++;
                }
                r = Math.floor(r / count); 
                g = Math.floor(g / count); 
                b = Math.floor(b / count);

                let rNorm = r/255, gNorm = g/255, bNorm = b/255;
                let cMax = Math.max(rNorm, gNorm, bNorm), cMin = Math.min(rNorm, gNorm, bNorm);
                let delta = cMax - cMin;
                let h = 0, s = 0, l = (cMax + cMin) / 2;

                if (delta !== 0) {
                    s = l < 0.5 ? delta / (cMax + cMin) : delta / (2 - cMax - cMin);
                    if (cMax === rNorm) h = ((gNorm - bNorm) / delta) % 6;
                    else if (cMax === gNorm) h = (bNorm - rNorm) / delta + 2;
                    else h = (rNorm - gNorm) / delta + 4;
                    h = Math.round(h * 60);
                    if (h < 0) h += 360;
                }

                if (s > 0.08) { s = 1.0; l = 0.55; } else { s = 0; l = 1; }

                let c = (1 - Math.abs(2 * l - 1)) * s;
                let x = c * (1 - Math.abs((h / 60) % 2 - 1));
                let m = l - c / 2;
                let finalR = 0, finalG = 0, finalB = 0;

                if (h >= 0 && h < 60) { finalR = c; finalG = x; finalB = 0; }
                else if (h >= 60 && h < 120) { finalR = x; finalG = c; finalB = 0; }
                else if (h >= 120 && h < 180) { finalR = 0; finalG = c; finalB = x; }
                else if (h >= 180 && h < 240) { finalR = 0; finalG = x; finalB = c; }
                else if (h >= 240 && h < 300) { finalR = x; finalG = 0; finalB = c; }
                else if (h >= 300 && h < 360) { finalR = c; finalG = 0; finalB = x; }

                r = Math.round((finalR + m) * 255);
                g = Math.round((finalG + m) * 255);
                b = Math.round((finalB + m) * 255);

                rootVars.setProperty('--primary-color-rgb', `${r}, ${g}, ${b}`);
                rootVars.setProperty('--primary-color', `rgb(${r}, ${g}, ${b})`);
                
                if (!playerContainer.classList.contains('paused')) {
                    coverGlow.style.boxShadow = `0 30px 80px -10px rgba(${r}, ${g}, ${b}, 0.85)`;
                }
            } catch (e) {
                rootVars.setProperty('--primary-color-rgb', `255, 255, 255`);
                rootVars.setProperty('--primary-color', `#ffffff`);
            }
        };

        slider.addEventListener('input', () => {
            isDragging = true;
            if (!audioMain.duration) return;
            const seekTime = (slider.value / 100) * audioMain.duration;
            currTimeEl.textContent = formatTime(seekTime);
            slider.style.setProperty('--progress', `${slider.value}%`);
        });

        slider.addEventListener('change', () => {
            if (!audioMain.duration) return;
            const seekTime = (slider.value / 100) * audioMain.duration;
            audioMain.currentTime = seekTime;
            videoMain.currentTime = seekTime; 
            isDragging = false;
            if (audioMain.duration - audioMain.currentTime > CROSSFADE_DURATION) forceStopCrossfade();
        });

        function getNextIndex(isAuto = false) {
            if (isAuto && isRepeat) return currentIndex; 
            if (isShuffle) {
                let next;
                do { next = Math.floor(Math.random() * playlist.length); } 
                while (next === currentIndex && playlist.length > 1);
                return next;
            }
            return (currentIndex + 1) % playlist.length;
        }

        function forceStopCrossfade() {
            if (crossfadeInterval) { clearInterval(crossfadeInterval); crossfadeInterval = null; }
            isCrossfading = false;
            playerContainer.classList.remove('is-mixing');
            audioNext.pause(); videoNext.pause();
            audioNext.volume = 0; videoNext.style.opacity = '0';
            audioMain.volume = 1; videoMain.style.opacity = '1';
        }

        function startSmartCrossfade(isAuto = true) {
            if (isCrossfading) return;
            isCrossfading = true;
            playerContainer.classList.add('is-mixing');

            let nextIdx = getNextIndex(isAuto);
            
            let outgoingAudio = audioMain; let outgoingVideo = videoMain;
            audioMain = audioNext; videoMain = videoNext;
            audioNext = outgoingAudio; videoNext = outgoingVideo;

            audioMain.src = playlist[nextIdx].file;
            videoMain.src = playlist[nextIdx].video;
            audioMain.volume = 0; audioMain.currentTime = 0; videoMain.currentTime = 0;

            resetProgressUI();
            audioMain.play().catch(e => console.log(e));
            videoMain.play().catch(e => console.log(e));

            currentIndex = nextIdx;
            loadSongInfo(currentIndex);

            let startTime = Date.now();
            let durationMs = CROSSFADE_DURATION * 1000; 

            if (crossfadeInterval) clearInterval(crossfadeInterval);

            crossfadeInterval = setInterval(() => {
                let elapsed = Date.now() - startTime;
                let t = Math.min(elapsed / durationMs, 1); 
                
                audioMain.volume = Math.min(1, Math.max(0, Math.sin(t * 0.5 * Math.PI)));
                audioNext.volume = Math.min(1, Math.max(0, Math.cos(t * 0.5 * Math.PI)));
                videoMain.style.opacity = t; videoNext.style.opacity = 1 - t;

                if (t >= 1) forceStopCrossfade();
            }, 50);
        }

        const playBtn = document.getElementById('btn-play');
        const playIcon = document.getElementById('play-icon');
        const pauseIcon = document.getElementById('pause-icon');

        function togglePlay() {
            if (isPlaying) {
                audioMain.pause(); videoMain.pause();
                if (isCrossfading) { audioNext.pause(); videoNext.pause(); }
                playIcon.style.display = 'block'; pauseIcon.style.display = 'none';
                
                playerContainer.classList.add('paused');
            } else {
                audioMain.play(); videoMain.play().catch(e=>console.log(e));
                if (isCrossfading) { audioNext.play(); videoNext.play(); }
                playIcon.style.display = 'none'; pauseIcon.style.display = 'block';
                
                playerContainer.classList.remove('paused');
                coverGlow.style.boxShadow = `0 30px 80px -10px rgba(${rootVars.getPropertyValue('--primary-color-rgb') || '255,255,255'}, 0.85)`;
            }
            isPlaying = !isPlaying;
        }

        playBtn.addEventListener('click', togglePlay);

        function playManual(index) {
            forceStopCrossfade(); 
            currentIndex = index; initPlayer();
            if(isPlaying) { audioMain.play(); videoMain.play(); }
        }

        document.getElementById('btn-next').addEventListener('click', () => { playManual(getNextIndex(false)); });
        document.getElementById('btn-prev').addEventListener('click', () => {
            if (audioMain.currentTime > 3) { audioMain.currentTime = 0; videoMain.currentTime = 0; } 
            else { playManual((currentIndex - 1 + playlist.length) % playlist.length); }
        });

        document.getElementById('btn-shuffle').addEventListener('click', function() {
            isShuffle = !isShuffle; this.classList.toggle('active-action', isShuffle);
        });

        document.getElementById('btn-repeat').addEventListener('click', function() {
            isRepeat = !isRepeat; this.classList.toggle('active-action', isRepeat);
        });

        initPlayer();
    </script>
</body>
</html>
