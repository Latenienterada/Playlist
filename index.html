<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIVET</title>
    <style>
        /* ================= CSS: UI APPLE MUSIC ================= */
        :root {
            --primary-color: #ffffff; 
            --primary-color-rgb: 255, 255, 255;
            --bg-color: #000000;
            --text-color: #FFFFFF;
            --text-secondary: rgba(255, 255, 255, 0.55);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden;
        }

        .video-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2;
            background-color: #111;
        }

        .bg-video {
            position: absolute;
            top: -10%; left: -10%; width: 120%; height: 120%; 
            object-fit: cover;
            filter: blur(80px) saturate(350%) brightness(0.6);
            transition: opacity 1.2s ease-in-out;
        }

        .vignette-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(180deg, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.8) 100%);
            z-index: -1;
            pointer-events: none;
        }

        .player-container {
            width: 100%; 
            max-width: 390px; 
            padding: 40px 35px;
            background: rgba(20, 20, 20, 0.2);
            backdrop-filter: blur(60px) saturate(200%);
            -webkit-backdrop-filter: blur(60px) saturate(200%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 48px;
            box-shadow: 0 50px 100px rgba(0, 0, 0, 0.7), inset 0 1px 1px rgba(255,255,255,0.2);
            text-align: center;
            z-index: 10;
        }

        .cover-wrapper {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 24px; 
            overflow: hidden;
            margin-bottom: 40px;
            box-shadow: 0 30px 80px -10px rgba(var(--primary-color-rgb), 0.95);
            transition: transform 0.6s cubic-bezier(0.32, 0.72, 0, 1), box-shadow 0.6s ease;
            position: relative;
        }

        .cover-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s cubic-bezier(0.32, 0.72, 0, 1);
        }

        .paused .cover-wrapper {
            transform: scale(0.78); 
            box-shadow: 0 15px 30px -10px rgba(var(--primary-color-rgb), 0.4) !important;
            border-radius: 30px;
        }

        .paused .cover-wrapper img { transform: scale(1.02); }

        .song-info {
            margin-bottom: 30px;
            display: flex;
            flex-direction: column;
            gap: 2px;
            text-align: left; 
        }

        .song-title {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: #FFFFFF;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        .song-artist {
            font-size: 18px;
            color: var(--text-secondary);
            font-weight: 500;
            letter-spacing: 0.1px;
        }

        .progress-container {
            width: 100%;
            margin-bottom: 40px;
            position: relative;
        }

        .progress-slider {
            -webkit-appearance: none;
            width: 100%;
            height: 6px; 
            background-color: rgba(var(--primary-color-rgb), 0.3);
            background-image: linear-gradient(var(--primary-color), var(--primary-color));
            background-size: var(--progress, 0%) 100%;
            background-repeat: no-repeat;
            border-radius: 4px;
            outline: none;
            cursor: pointer;
            filter: drop-shadow(0 0 5px rgba(var(--primary-color-rgb), 0.5));
            transition: height 0.2s cubic-bezier(0.25, 1, 0.5, 1), background-color 0.5s ease;
        }

        .progress-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 0px; 
            height: 0px;
            border-radius: 50%;
            background: var(--primary-color);
            box-shadow: 0 0 15px rgba(var(--primary-color-rgb), 1);
            transition: width 0.2s ease, height 0.2s ease;
        }

        .progress-container:hover .progress-slider,
        .progress-slider:active { height: 9px; }

        .progress-container:hover .progress-slider::-webkit-slider-thumb,
        .progress-slider:active::-webkit-slider-thumb {
            width: 18px; height: 18px;
        }

        .time-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 8px;
            font-weight: 600;
            font-variant-numeric: tabular-nums;
            letter-spacing: 0.2px;
            opacity: 0.8;
            position: relative; 
        }

        .time-text { transition: opacity 0.4s ease; }

        .mixing-label {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            color: var(--primary-color);
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2.5px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
            text-shadow: 0 0 20px rgba(var(--primary-color-rgb), 1);
        }

        .is-mixing .time-text { opacity: 0; }
        .is-mixing .mixing-label {
            opacity: 1;
            animation: glow-pulse 0.8s infinite alternate ease-in-out;
        }

        @keyframes glow-pulse {
            0% { opacity: 0.6; filter: brightness(1); transform: translate(-50%, -50%) scale(0.95); }
            100% { opacity: 1; filter: brightness(1.8); transform: translate(-50%, -50%) scale(1.05); }
        }

        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            padding: 0 10px;
        }

        .btn {
            background: transparent;
            border: none;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.25, 1, 0.5, 1), color 0.5s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 12px;
        }

        .btn-nav {
            width: 44px; height: 44px;
            color: var(--primary-color);
            filter: drop-shadow(0 0 15px rgba(var(--primary-color-rgb), 1));
        }
        .btn-nav svg { width: 34px; height: 34px; fill: currentColor; }
        .btn-nav:hover { opacity: 1; transform: scale(1.1); filter: drop-shadow(0 0 25px rgba(var(--primary-color-rgb), 1)); }
        .btn-nav:active { transform: scale(0.9); opacity: 0.7; }

        .btn-action {
            width: 36px; height: 36px;
            color: rgba(var(--primary-color-rgb), 0.6); 
        }
        .btn-action svg { width: 22px; height: 22px; fill: currentColor; }
        
        .active-action {
            color: var(--primary-color) !important;
            background-color: rgba(var(--primary-color-rgb), 0.25);
            filter: drop-shadow(0 0 12px rgba(var(--primary-color-rgb), 0.8));
        }

        .btn-play {
            width: 64px; height: 64px;
            color: var(--primary-color);
            filter: drop-shadow(0 0 20px rgba(var(--primary-color-rgb), 1));
        }
        .btn-play svg { width: 50px; height: 50px; fill: currentColor; }
        .btn-play:hover {
            transform: scale(1.1);
            filter: drop-shadow(0 0 30px rgba(var(--primary-color-rgb), 1));
        }
        .btn-play:active { transform: scale(0.9); opacity: 0.7; }

    </style>
</head>
<body>

    <div class="video-container">
        <video id="bg-video-1" class="bg-video" autoplay loop muted playsinline></video>
        <video id="bg-video-2" class="bg-video" autoplay loop muted playsinline style="opacity: 0;"></video>
        <div class="vignette-overlay"></div>
    </div>

    <div class="player-container paused" id="player">
        <div class="cover-wrapper" id="cover-glow">
            <img src="" id="cover">
        </div>
        
        <div class="song-info">
            <div class="song-title" id="title">Cargando...</div>
            <div class="song-artist" id="artist">Cargando...</div>
        </div>

        <div class="progress-container">
            <input type="range" class="progress-slider" id="progress-slider" min="0" max="100" step="0.1" value="0">
            <div class="time-info">
                <span id="current-time" class="time-text">0:00</span>
                <span class="mixing-label">Mixing...</span>
                <span id="duration" class="time-text">0:00</span>
            </div>
        </div>

        <div class="controls">
            <button class="btn btn-action" id="btn-shuffle" title="Modo Aleatorio">
                <svg viewBox="0 0 24 24"><path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/></svg>
            </button>
            <button class="btn btn-nav" id="btn-prev" title="Anterior">
                <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
            </button>
            
            <button class="btn btn-play" id="btn-play" title="Reproducir / Pausar">
                <svg id="play-icon" viewBox="0 0 24 24"><path d="M8 5.14v14.72a1 1 0 001.5.86l11-7.36a1 1 0 000-1.72l-11-7.36a1 1 0 00-1.5.86z"/></svg>
                <svg id="pause-icon" viewBox="0 0 24 24" style="display:none;"><path d="M6 5h3v14H6zm9 0h3v14h-3z" rx="1"/></svg>
            </button>
            
            <button class="btn btn-nav" id="btn-next" title="Siguiente">
                <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
            </button>
            <button class="btn btn-action" id="btn-repeat" title="Repetir Canción">
                <svg viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg>
            </button>
        </div>
    </div>

    <script>
        /* ================= CONFIGURACIÓN DE TU PLAYLIST ================= */
        const playlist =[
            { title: "WOH OH OH", artist: "OMAR COURTZ, ROA", cover: "covers/WOH OH OH.jpg", file: "songs/WOH OH OH.mp3", video: "videos/WOH OH OH.mp4" },
            { title: "444", artist: "YAN BLOCK", cover: "covers/444.jpg", file: "songs/444.mp3", video: "videos/444.mp4" },
            { title: "FOREVEL TU GANTEL", artist: "OMAR COURTZ, NENGO FLOW", cover: "covers/FOREVEL TU GANTEL.jpg", file: "songs/FOREVEL TU GANTEL.mp3", video: "videos/FOREVEL TU GANTEL.mp4" },
            { title: "YO QUIERO", artist: "HADES66", cover: "covers/YO QUIERO.jpg", file: "songs/YO QUIERO.mp3", video: "videos/YO QUIERO.mp4" },
            { title: "VVS SWITCH REMIX", artist: "PRESSURE, YVNGCHIMI, CDOBLETA, HADES66, ANUEL AA, LUAR LA L", cover: "covers/VVS SWITCH REMIX.jpg", file: "songs/VVS SWITCH REMIX.mp3", video: "videos/VVS SWITCH REMIX.mp4" },
            { title: "FALSAS PROMESAS REMIX", artist: "MIDNVGHT, MORA, ELADIO CARRION, ROA, CLARENT", cover: "covers/FALSAS PROMESAS REMIX.jpg", file: "songs/FALSAS PROMESAS REMIX.mp3", video: "videos/FALSAS PROMESAS REMIX.mp4" },
            { title: "TE VAS", artist: "OZUNA", cover: "covers/TE VAS.jpg", file: "songs/TE VAS.mp3", video: "videos/TE VAS.mp4" },
            { title: "RELIGION", artist: "YAN BLOCK", cover: "covers/RELIGION.jpg", file: "songs/RELIGION.mp3", video: "videos/RELIGION.mp4" },
            { title: "MEDIA HORA", artist: "YAN BLOCK", cover: "covers/MEDIA HORA.jpg", file: "songs/MEDIA HORA.mp3", video: "videos/MEDIA HORA.mp4" }
        ];

        let currentIndex = 0;
        let isPlaying = false;
        let isShuffle = false;
        let isRepeat = false; 
        let isDragging = false; 

        const CROSSFADE_DURATION = 12; 
        let isCrossfading = false;
        let crossfadeInterval = null;

        let audioMain = new Audio();
        let audioNext = new Audio();
        let videoMain = document.getElementById('bg-video-1');
        let videoNext = document.getElementById('bg-video-2');

        const coverEl = document.getElementById('cover');
        const titleEl = document.getElementById('title');
        const artistEl = document.getElementById('artist');
        const rootVars = document.documentElement.style;
        const coverGlow = document.getElementById('cover-glow');
        const slider = document.getElementById('progress-slider');
        const currTimeEl = document.getElementById('current-time');
        const durationEl = document.getElementById('duration');
        const playerContainer = document.getElementById('player');

        function formatTime(sec) {
            if (isNaN(sec)) return "0:00";
            let min = Math.floor(sec / 60);
            let s = Math.floor(sec % 60);
            return `${min}:${s < 10 ? '0' : ''}${s}`;
        }

        function resetProgressUI() {
            slider.value = 0;
            slider.style.setProperty('--progress', '0%');
            currTimeEl.textContent = "0:00";
            durationEl.textContent = "0:00";
        }

        function loadSongInfo(index) {
            const song = playlist[index];
            coverEl.src = song.cover;
            titleEl.textContent = song.title;
            artistEl.textContent = song.artist;
        }

        function initPlayer() {
            loadSongInfo(currentIndex);
            audioMain.src = playlist[currentIndex].file;
            videoMain.src = playlist[currentIndex].video;
            forceStopCrossfade(); 
            resetProgressUI();
        }

        function setupAudioListeners(audioElement) {
            audioElement.addEventListener('timeupdate', (e) => {
                if (e.target !== audioMain) return;
                if (!audioMain.duration) return;

                const currentTime = audioMain.currentTime;
                const duration = audioMain.duration;

                if (!isDragging && Math.abs(videoMain.currentTime - currentTime) > 0.3) {
                    videoMain.currentTime = currentTime;
                }
                
                if (!isDragging) {
                    const percent = (currentTime / duration) * 100;
                    slider.value = percent;
                    slider.style.setProperty('--progress', `${percent}%`);
                    currTimeEl.textContent = formatTime(currentTime);
                }

                if (duration - currentTime <= CROSSFADE_DURATION && !isCrossfading && duration > 0) {
                    startSmartCrossfade(true); 
                }
            });

            audioElement.addEventListener('loadedmetadata', (e) => {
                if (e.target !== audioMain) return;
                durationEl.textContent = formatTime(audioMain.duration);
            });
        }

        setupAudioListeners(audioMain);
        setupAudioListeners(audioNext);

        coverEl.onload = function() {
            const canvas = document.createElement('canvas');
            const context = canvas.getContext('2d');
            canvas.width = coverEl.width || 1;
            canvas.height = coverEl.height || 1;
            
            try {
                context.drawImage(coverEl, 0, 0, canvas.width, canvas.height);
                const data = context.getImageData(0, 0, canvas.width, canvas.height).data;
                
                let r = 0, g = 0, b = 0, count = 0;
                
                for (let i = 0; i < data.length; i += 16) { 
                    r += data[i]; g += data[i+1]; b += data[i+2];
                    count++;
                }
                r = Math.floor(r / count); 
                g = Math.floor(g / count); 
                b = Math.floor(b / count);

                let rNorm = r/255, gNorm = g/255, bNorm = b/255;
                let cMax = Math.max(rNorm, gNorm, bNorm), cMin = Math.min(rNorm, gNorm, bNorm);
                let delta = cMax - cMin;
                let h = 0, s = 0, l = (cMax + cMin) / 2;

                if (delta !== 0) {
                    s = l < 0.5 ? delta / (cMax + cMin) : delta / (2 - cMax - cMin);
                    if (cMax === rNorm) h = ((gNorm - bNorm) / delta) % 6;
                    else if (cMax === gNorm) h = (bNorm - rNorm) / delta + 2;
                    else h = (rNorm - gNorm) / delta + 4;
                    h = Math.round(h * 60);
                    if (h < 0) h += 360;
                }

                if (s > 0.08) { 
                    s = 1.0; 
                    l = 0.55; 
                } else {
                    s = 0;
                    l = 1; 
                }

                let c = (1 - Math.abs(2 * l - 1)) * s;
                let x = c * (1 - Math.abs((h / 60) % 2 - 1));
                let m = l - c / 2;
                let finalR = 0, finalG = 0, finalB = 0;

                if (h >= 0 && h < 60) { finalR = c; finalG = x; finalB = 0; }
                else if (h >= 60 && h < 120) { finalR = x; finalG = c; finalB = 0; }
                else if (h >= 120 && h < 180) { finalR = 0; finalG = c; finalB = x; }
                else if (h >= 180 && h < 240) { finalR = 0; finalG = x; finalB = c; }
                else if (h >= 240 && h < 300) { finalR = x; finalG = 0; finalB = c; }
                else if (h >= 300 && h < 360) { finalR = c; finalG = 0; finalB = x; }

                r = Math.round((finalR + m) * 255);
                g = Math.round((finalG + m) * 255);
                b = Math.round((finalB + m) * 255);

                rootVars.setProperty('--primary-color-rgb', `${r}, ${g}, ${b}`);
                rootVars.setProperty('--primary-color', `rgb(${r}, ${g}, ${b})`);
                
                if (!playerContainer.classList.contains('paused')) {
                    coverGlow.style.boxShadow = `0 30px 80px -10px rgba(${r}, ${g}, ${b}, 0.95)`;
                }
            } catch (e) {
                console.error("Error leyendo el color:", e);
                rootVars.setProperty('--primary-color-rgb', `255, 255, 255`);
                rootVars.setProperty('--primary-color', `#ffffff`);
            }
        };

        slider.addEventListener('input', () => {
            isDragging = true;
            if (!audioMain.duration) return;
            const seekTime = (slider.value / 100) * audioMain.duration;
            currTimeEl.textContent = formatTime(seekTime);
            slider.style.setProperty('--progress', `${slider.value}%`);
        });

        slider.addEventListener('change', () => {
            if (!audioMain.duration) return;
            const seekTime = (slider.value / 100) * audioMain.duration;
            audioMain.currentTime = seekTime;
            videoMain.currentTime = seekTime; 
            isDragging = false;
            if (audioMain.duration - audioMain.currentTime > CROSSFADE_DURATION) forceStopCrossfade();
        });

        function getNextIndex(isAuto = false) {
            if (isAuto && isRepeat) return currentIndex; 
            if (isShuffle) {
                let next;
                do { next = Math.floor(Math.random() * playlist.length); } 
                while (next === currentIndex && playlist.length > 1);
                return next;
            }
            return (currentIndex + 1) % playlist.length;
        }

        function forceStopCrossfade() {
            if (crossfadeInterval) { clearInterval(crossfadeInterval); crossfadeInterval = null; }
            isCrossfading = false;
            playerContainer.classList.remove('is-mixing');
            audioNext.pause(); videoNext.pause();
            audioNext.volume = 0; videoNext.style.opacity = '0';
            audioMain.volume = 1; videoMain.style.opacity = '1';
        }

        function startSmartCrossfade(isAuto = true) {
            if (isCrossfading) return;
            isCrossfading = true;
            playerContainer.classList.add('is-mixing');

            let nextIdx = getNextIndex(isAuto);
            
            let outgoingAudio = audioMain; let outgoingVideo = videoMain;
            audioMain = audioNext; videoMain = videoNext;
            audioNext = outgoingAudio; videoNext = outgoingVideo;

            audioMain.src = playlist[nextIdx].file;
            videoMain.src = playlist[nextIdx].video;
            audioMain.volume = 0; audioMain.currentTime = 0; videoMain.currentTime = 0;

            resetProgressUI();
            audioMain.play().catch(e => console.log(e));
            videoMain.play().catch(e => console.log(e));

            currentIndex = nextIdx;
            loadSongInfo(currentIndex);

            let startTime = Date.now();
            let durationMs = CROSSFADE_DURATION * 1000; 

            if (crossfadeInterval) clearInterval(crossfadeInterval);

            crossfadeInterval = setInterval(() => {
                let elapsed = Date.now() - startTime;
                let t = Math.min(elapsed / durationMs, 1); 
                
                audioMain.volume = Math.min(1, Math.max(0, Math.sin(t * 0.5 * Math.PI)));
                audioNext.volume = Math.min(1, Math.max(0, Math.cos(t * 0.5 * Math.PI)));
                videoMain.style.opacity = t; videoNext.style.opacity = 1 - t;

                if (t >= 1) forceStopCrossfade();
            }, 50);
        }

        const playBtn = document.getElementById('btn-play');
        const playIcon = document.getElementById('play-icon');
        const pauseIcon = document.getElementById('pause-icon');

        function togglePlay() {
            if (isPlaying) {
                audioMain.pause(); videoMain.pause();
                if (isCrossfading) { audioNext.pause(); videoNext.pause(); }
                playIcon.style.display = 'block'; pauseIcon.style.display = 'none';
                playerContainer.classList.add('paused');
            } else {
                audioMain.play(); videoMain.play().catch(e=>console.log(e));
                if (isCrossfading) { audioNext.play(); videoNext.play(); }
                playIcon.style.display = 'none'; pauseIcon.style.display = 'block';
                playerContainer.classList.remove('paused');
                coverGlow.style.boxShadow = `0 30px 80px -10px rgba(${rootVars.getPropertyValue('--primary-color-rgb') || '255,255,255'}, 0.95)`;
            }
            isPlaying = !isPlaying;
        }

        playBtn.addEventListener('click', togglePlay);

        function playManual(index) {
            forceStopCrossfade(); 
            currentIndex = index; initPlayer();
            if(isPlaying) { audioMain.play(); videoMain.play(); }
        }

        document.getElementById('btn-next').addEventListener('click', () => { playManual(getNextIndex(false)); });
        document.getElementById('btn-prev').addEventListener('click', () => {
            if (audioMain.currentTime > 3) { audioMain.currentTime = 0; videoMain.currentTime = 0; } 
            else { playManual((currentIndex - 1 + playlist.length) % playlist.length); }
        });

        document.getElementById('btn-shuffle').addEventListener('click', function() {
            isShuffle = !isShuffle; this.classList.toggle('active-action', isShuffle);
        });

        document.getElementById('btn-repeat').addEventListener('click', function() {
            isRepeat = !isRepeat; this.classList.toggle('active-action', isRepeat);
        });

        initPlayer();
    </script>
</body>
</html>
